<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Metrox TaxInvoo Delivery Challan - Emerald Edge</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --ink: #152033;
      --muted: #5d6573;
      --panel: #ffffff;
      --line: #e7e9ee;
      --accent: #86be31;
      --accent-dark: #72a429;
      --navy: #27344c;
      --bg: #f2f4f8;
      --font: 'Inter', Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      padding: 14px;
      display: grid;
      gap: 14px;
      justify-content: center;
    }

    .sheet {
      width: 210mm;
      min-height: 297mm;
      background: var(--panel);
      border: 1px solid #d8dde6;
      box-shadow: 0 20px 48px rgba(16,24,40,0.16);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      page-break-after: always;
      position: relative;
    }
    .sheet:last-child { page-break-after: auto; }

    .copy-stamp {
      position: absolute;
      top: 14px;
      right: 16px;
      z-index: 5;
      border: 1px solid rgba(134,190,49,0.55);
      background: rgba(134,190,49,0.16);
      color: #2d5602;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      min-height: 124px;
      border-bottom: 1px solid var(--line);
    }

    .hero-left {
      background: var(--navy);
      color: #fff;
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .hero-left::after,
    .hero-left::before {
      content: "";
      position: absolute;
      right: -34px;
      width: 96px;
      transform: skewX(-34deg);
      background: var(--accent);
      opacity: 0.95;
    }
    .hero-left::after { top: 0; height: 100%; }
    .hero-left::before {
      top: 10px;
      height: calc(100% - 20px);
      right: -54px;
      background: var(--accent-dark);
    }

    .logo {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #fff;
      color: var(--navy);
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 20px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.82);
      z-index: 1;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 3px;
      border-radius: 50%;
      background: #fff;
    }

    .hero-company {
      z-index: 1;
      line-height: 1.2;
    }

    .hero-company strong {
      font-size: 28px;
      letter-spacing: 0.2px;
      line-height: 1.05;
      display: block;
    }

    .hero-company small { font-size: 12px; opacity: 0.8; }

    .hero-right {
      padding: 20px 24px;
      min-width: 280px;
      display: grid;
      align-content: center;
      justify-items: end;
      gap: 5px;
      text-align: right;
    }

    .hero-right h1 {
      margin: 0;
      color: var(--accent-dark);
      font-size: 33px;
      letter-spacing: 0.8px;
      line-height: 1;
    }

    .meta-mini {
      display: grid;
      gap: 3px;
      font-size: 12px;
      color: var(--muted);
    }
    .meta-mini strong { color: var(--ink); font-weight: 700; }

    .content {
      padding: 18px 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }

    .party-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .party {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px;
      line-height: 1.45;
      font-size: 12px;
      color: var(--muted);
      min-height: 110px;
    }

    .party .label {
      color: var(--accent-dark);
      font-weight: 700;
      font-size: 11px;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11.5px;
      border: 1px solid var(--line);
    }

    th, td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 8px 6px;
      vertical-align: top;
      text-align: left;
    }

    th:last-child, td:last-child { border-right: none; }
    tr:last-child td { border-bottom: none; }

    th {
      color: #fff;
      font-size: 10.5px;
      letter-spacing: 0.4px;
      font-weight: 700;
      text-transform: uppercase;
      background: var(--navy);
    }

    .summary {
      margin-left: auto;
      width: 300px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #f8fafc;
      font-size: 12px;
    }

    .summary .row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px dashed var(--line);
    }
    .summary .row:last-child { border-bottom: none; }

    .summary .grand {
      margin-top: 8px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
    }

    .notes {
      border-top: 1px dashed var(--line);
      padding-top: 8px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    .footer {
      border-top: 1px solid var(--line);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 11px;
    }

    .sign-line {
      width: 220px;
      border-top: 1px solid #c4cad5;
      padding-top: 6px;
      text-align: center;
    }

    @media print {
      body { padding: 0; background: #fff; }
      .sheet { box-shadow: none; border: 1px solid #d8dde6; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    (function () {
      const stored = localStorage.getItem('Metrox TaxInvoo_export_delivery_challan');
      if (!stored) return;
      let data;
      try { data = JSON.parse(stored); } catch (_) { return; }

      const theme = data.theme || {};
      const fmt = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 2 });
      const copies = Array.isArray(data.challanCopies) && data.challanCopies.length
        ? data.challanCopies
        : ['Original', 'Transport Copy', 'Receiver Copy'];
      const items = Array.isArray(data.items) ? data.items : [];
      const seller = data.seller || {};
      const customer = data.customer || {};
      const dateText = data.date ? new Date(data.date).toLocaleDateString('en-IN') : '—';
      const deliveryDateText = data.deliveryDate ? new Date(data.deliveryDate).toLocaleDateString('en-IN') : '—';

      if (theme.accent) document.documentElement.style.setProperty('--accent', theme.accent);
      if (theme.bg) document.documentElement.style.setProperty('--bg', theme.bg);
      if (data.font) document.documentElement.style.setProperty('--font', `'${data.font}', Arial, sans-serif`);

      const root = document.getElementById('root');
      root.innerHTML = copies.map((copyLabel) => `
        <section class="sheet">
          <span class="copy-stamp">${copyLabel}</span>
          <header class="hero">
            <div class="hero-left">
              <div class="logo">${data.logo ? `<img src="${data.logo}" alt="logo" />` : (seller.name || 'M').trim().slice(0,2).toUpperCase()}</div>
              <div class="hero-company">
                <strong>${seller.name || 'Business Name'}</strong>
                <small>${seller.address || '—'}<br/>GSTIN: ${seller.gstin || '—'}</small>
              </div>
            </div>
            <div class="hero-right">
              <h1>DELIVERY CHALLAN</h1>
              <div class="meta-mini">
                <div>No: <strong>${data.id || '—'}</strong></div>
                <div>Date: <strong>${dateText}</strong></div>
                <div>Status: <strong>${String(data.status || 'open').toUpperCase()}</strong></div>
              </div>
            </div>
          </header>

          <main class="content">
            <div class="party-grid">
              <div class="party">
                <div class="label">Consignee</div>
                <strong style="color:#111827; font-size:15px;">${customer.name || '—'}</strong><br/>
                ${customer.address || '—'}<br/>
                GSTIN: ${customer.gstin || '—'}<br/>
                State: ${customer.state || '—'} ${customer.stateCode ? `(${customer.stateCode})` : ''}<br/>
                Phone: ${customer.phone || '—'}
              </div>
              <div class="party">
                <div class="label">Dispatch Details</div>
                Invoice Ref: ${data.invoiceId || '—'}<br/>
                Delivery Date: ${deliveryDateText}<br/>
                Transport: ${data.transportMode || '—'}<br/>
                Vehicle / LR: ${data.vehicleNo || '—'}<br/>
                Place of Supply: ${(data.placeOfSupply || 'intra') === 'inter' ? 'Inter-state' : 'Intra-state'}
              </div>
            </div>

            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Description</th>
                  <th>HSN/SAC</th>
                  <th>Qty</th>
                  <th>Rate</th>
                  <th>Tax %</th>
                  <th>Tax Amt</th>
                  <th>Amount</th>
                </tr>
              </thead>
              <tbody>
                ${items.length ? items.map((item, idx) => `
                  <tr>
                    <td>${idx + 1}</td>
                    <td>${item.description || ''}</td>
                    <td>${item.hsn || ''}</td>
                    <td>${Number(item.qty) || 0}</td>
                    <td>₹${fmt.format(Number(item.rate) || 0)}</td>
                    <td>${fmt.format(Number(item.taxRate) || 0)}%</td>
                    <td>₹${fmt.format(Number(item.taxAmount) || 0)}</td>
                    <td>₹${fmt.format(Number(item.total) || 0)}</td>
                  </tr>
                `).join('') : '<tr><td colspan="8">No line items</td></tr>'}
              </tbody>
            </table>

            <div class="summary">
              <div class="row"><span>Taxable</span><span>₹${fmt.format(Number(data.taxable) || 0)}</span></div>
              <div class="row"><span>GST</span><span>₹${fmt.format(Number(data.gst) || 0)}</span></div>
              <div class="grand"><span>Total</span><span>₹${fmt.format(Number(data.amount) || 0)}</span></div>
            </div>

            <div class="notes">
              ${data.notes ? `<strong>Notes:</strong> ${data.notes}<br/>` : ''}
              This challan is for movement of goods and does not represent a tax invoice.
            </div>
          </main>

          <footer class="footer">
            <div class="sign-line">Receiver Signature</div>
            <div class="sign-line">For ${seller.name || 'Company'}</div>
          </footer>
        </section>
      `).join('');

      const params = new URLSearchParams(window.location.search);
      const auto = params.get('auto');
      if (auto === 'print') {
        setTimeout(() => window.print(), 300);
      }

      async function downloadPdf() {
        if (!window.html2canvas || !window.jspdf) {
          alert('PDF library not loaded. Please check your internet connection.');
          return;
        }
        const pages = Array.from(document.querySelectorAll('.sheet'));
        if (!pages.length) return;
        const pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        for (let i = 0; i < pages.length; i++) {
          const node = pages[i];
          const canvas = await window.html2canvas(node, {
            scale: 2,
            backgroundColor: '#ffffff',
            width: node.offsetWidth,
            height: node.offsetHeight,
            windowWidth: node.scrollWidth,
            windowHeight: node.scrollHeight
          });
          const imgData = canvas.toDataURL('image/png');
          const imgWidth = canvas.width;
          const imgHeight = canvas.height;
          const scale = Math.min(pageWidth / imgWidth, pageHeight / imgHeight);
          const renderW = imgWidth * scale;
          const renderH = imgHeight * scale;
          const x = (pageWidth - renderW) / 2;
          const y = (pageHeight - renderH) / 2;
          if (i > 0) pdf.addPage();
          pdf.addImage(imgData, 'PNG', x, y, renderW, renderH);
        }

        pdf.save(`${data.id || 'delivery-challan'}-emerald.pdf`);
      }

      if (auto === 'pdf') {
        setTimeout(downloadPdf, 450);
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</body>
</html>
