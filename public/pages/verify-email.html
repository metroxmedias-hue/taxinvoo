<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Verify Email | TaxInvoo</title>
  <link rel="stylesheet" href="../assets/poppins.css" />
  <style>
    :root {
      --bg: #f3f6ff;
      --card: rgba(255, 255, 255, 0.9);
      --line: rgba(24, 34, 92, 0.12);
      --ink: #171d44;
      --muted: #5c6691;
      --brand-a: #69d7d8;
      --brand-b: #3d8bde;
      --brand-c: #6a4df5;
      --error: #c23a4a;
      --ok: #1b7a56;
      --shadow: 0 22px 48px rgba(30, 48, 120, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(700px 400px at 85% 0%, rgba(106, 77, 245, 0.14), transparent 64%),
        radial-gradient(700px 400px at 12% 0%, rgba(105, 215, 216, 0.14), transparent 62%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: 26px;
      display: grid;
      gap: 14px;
    }

    .logo {
      width: 190px;
      height: auto;
      display: block;
    }

    h1 {
      margin: 8px 0 0;
      font-size: clamp(24px, 3.5vw, 33px);
      line-height: 1.2;
      color: #11183e;
    }

    .lead {
      margin: 0;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
    }

    .email-chip {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      color: #294466;
      width: fit-content;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-row {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      border-color: transparent;
      color: #fff;
      background: linear-gradient(120deg, var(--brand-a), var(--brand-b), var(--brand-c));
      box-shadow: 0 14px 28px rgba(61, 139, 222, 0.3);
    }

    .btn-secondary {
      background: #fff;
      color: #1f2f54;
    }

    .status {
      font-size: 13px;
      font-weight: 600;
      min-height: 20px;
      line-height: 1.5;
      margin-top: 2px;
    }

    .status.error { color: var(--error); }
    .status.ok { color: var(--ok); }

    .footer-link {
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .footer-link a {
      color: #2f6fd5;
      text-decoration: none;
      font-weight: 700;
    }

    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="../assets/metrox-taxinvoo-logo.png" alt="TaxInvoo" />
    <h1>Please verify your email to continue using TaxInvoo</h1>
    <p class="lead">Open your inbox and click the verification link we sent during signup.</p>
    <div class="email-chip" id="user-email" style="display:none;"></div>

    <div class="btn-row">
      <button class="btn btn-primary" id="resend-btn" type="button">Resend Verification Email</button>
      <button class="btn btn-secondary" id="check-btn" type="button">I have verified, check again</button>
    </div>

    <div class="status" id="status-msg" aria-live="polite"></div>
    <div class="footer-link">Wrong account? <a href="login.html" id="back-login">Back to login</a></div>
  </main>

  <script type="module">
    import { auth, db } from "../js/firebase.js";
    import { onAuthStateChanged, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
    import { getUserAccessContext, isBusinessSetupComplete } from "../js/subscription.js";

    const resendBtn = document.getElementById('resend-btn');
    const checkBtn = document.getElementById('check-btn');
    const statusMsg = document.getElementById('status-msg');
    const userEmail = document.getElementById('user-email');

    const DOMAIN_BLOCK_MESSAGE = "This domain is not authorized for login. Please use the official TaxInvoo website.";
    const AUTHORIZED_HOSTS = new Set([
      'taxinvoo.com',
      'metrox-taxinvo.firebaseapp.com',
      'metrox-taxinvo.web.app',
      'localhost',
      '127.0.0.1',
      '::1'
    ]);
    const AUTHORIZED_HOST_SUFFIXES = ['.taxinvoo.com'];

    function isAuthorizedHost() {
      const host = String(window.location.hostname || '').trim().toLowerCase();
      if (!host) return false;
      if (AUTHORIZED_HOSTS.has(host)) return true;
      return AUTHORIZED_HOST_SUFFIXES.some((suffix) => host.endsWith(suffix));
    }

    function setStatus(message, type = '') {
      statusMsg.textContent = message || '';
      statusMsg.className = `status ${type}`.trim();
    }

    function setBusy(btn, busy, busyText, idleText) {
      if (!btn) return;
      btn.disabled = !!busy;
      btn.textContent = busy ? busyText : idleText;
      btn.style.opacity = busy ? '0.75' : '1';
      btn.style.cursor = busy ? 'not-allowed' : 'pointer';
    }

    async function routeVerifiedUser(user) {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const userRef = doc(db, 'users', user.uid);
      const userSnap = await getDoc(userRef);
      if (!userSnap.exists()) {
        window.location.href = 'business-setup.html';
        return;
      }

      const context = await getUserAccessContext(user.uid);
      const userData = context?.user || userSnap.data() || {};
      const businessData = context?.business || null;

      if (!userData.business_id || !isBusinessSetupComplete(businessData)) {
        window.location.href = 'business-setup.html';
        return;
      }
      window.location.href = '../app/index.html';
    }

    if (!isAuthorizedHost()) {
      setStatus(DOMAIN_BLOCK_MESSAGE, 'error');
      resendBtn.disabled = true;
      checkBtn.disabled = true;
    }

    onAuthStateChanged(auth, async (user) => {
      if (!isAuthorizedHost()) {
        if (user) {
          try { await signOut(auth); } catch (_) {}
        }
        return;
      }

      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      if (userEmail) {
        userEmail.style.display = 'block';
        userEmail.textContent = user.email || '';
      }

      if (user.emailVerified) {
        setStatus('Email verified. Redirecting...', 'ok');
        await routeVerifiedUser(user);
      }
    });

    resendBtn.addEventListener('click', async () => {
      const user = auth.currentUser;
      if (!isAuthorizedHost()) {
        setStatus(DOMAIN_BLOCK_MESSAGE, 'error');
        return;
      }
      if (!user) {
        setStatus('Session expired. Please login again.', 'error');
        window.location.href = 'login.html';
        return;
      }
      try {
        setBusy(resendBtn, true, 'Sending...', 'Resend Verification Email');
        await sendEmailVerification(user);
        setStatus('Verification email sent. Please check inbox/spam.', 'ok');
      } catch (err) {
        const code = String(err?.code || '');
        const msg = code === 'auth/too-many-requests'
          ? 'Too many requests. Please wait and try again.'
          : (err?.message || 'Failed to resend verification email.');
        setStatus(msg, 'error');
      } finally {
        setBusy(resendBtn, false, 'Sending...', 'Resend Verification Email');
      }
    });

    checkBtn.addEventListener('click', async () => {
      const user = auth.currentUser;
      if (!isAuthorizedHost()) {
        setStatus(DOMAIN_BLOCK_MESSAGE, 'error');
        return;
      }
      if (!user) {
        setStatus('Session expired. Please login again.', 'error');
        window.location.href = 'login.html';
        return;
      }
      try {
        setBusy(checkBtn, true, 'Checking...', 'I have verified, check again');
        await user.reload();
        if (!user.emailVerified) {
          setStatus('Email is not verified yet. Please verify and try again.', 'error');
          return;
        }
        setStatus('Email verified. Redirecting...', 'ok');
        await routeVerifiedUser(user);
      } catch (err) {
        setStatus(err?.message || 'Could not verify right now. Please try again.', 'error');
      } finally {
        setBusy(checkBtn, false, 'Checking...', 'I have verified, check again');
      }
    });
  </script>
</body>
</html>
