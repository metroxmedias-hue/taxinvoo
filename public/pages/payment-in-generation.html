<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../assets/poppins.css" />
  <link rel="stylesheet" href="../assets/light-theme-generation-overrides.css" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Metrox TaxInvoo - Create Payment In</title>
  <meta name="description" content="Dedicated Payment In creation form." />
  <style>
    :root {
      --bg: #10163b;
      --panel: rgba(22, 29, 74, 0.72);
      --line: rgba(214,222,255,0.16);
      --ink: #eef2ff;
      --muted: #b2badf;
      --accent: #58d6c1;
      --danger: #ff8f8f;
      --input: #151c45;
    }
    * { box-sizing: border-box; }
    body.light {
      --bg: #f4f7ff;
      --panel: #ffffff;
      --line: rgba(15,23,42,0.15);
      --ink: #0f172a;
      --muted: rgba(15,23,42,0.66);
      --accent: #0ea5a0;
      --danger: #dc2626;
      --input: #ffffff;
    }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 520px at 20% -10%, rgba(105,215,216,0.18), transparent),
        radial-gradient(880px 500px at 110% 5%, rgba(106,77,245,0.14), transparent),
        linear-gradient(180deg, #0a0d16, var(--bg));
      display: grid;
      place-items: center;
    }
    .shell {
      width: min(860px, 100%);
      background: color-mix(in oklab, var(--panel) 90%, transparent);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      display: grid;
      gap: 16px;
      backdrop-filter: blur(6px);
    }
    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.01em;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    form {
      display: grid;
      gap: 14px;
    }
    .form-section {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      gap: 10px;
      background: rgba(255,255,255,0.02);
    }
    .form-section-title {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    label {
      display: grid;
      gap: 7px;
      font-size: 13px;
      color: var(--muted);
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: var(--input);
      color: var(--ink);
      font: inherit;
      outline: none;
    }
    textarea { min-height: 82px; resize: vertical; }
    .summary {
      display: grid;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.02);
    }
    .summary.invoice-info {
      background: rgba(88,214,193,0.08);
      border-color: rgba(88,214,193,0.28);
    }
    .form-help {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
      opacity: 0.82;
    }
    .form-hint {
      font-size: 11px;
      line-height: 1.4;
      color: var(--muted);
      min-height: 16px;
      opacity: 0.82;
    }
    .form-hint.warn {
      color: #f97316;
    }
    .form-hint.info {
      color: #60a5fa;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }
    .row strong { color: var(--ink); }
    .status-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .status-chip.paid {
      color: #047857;
      background: rgba(16,185,129,0.14);
      border-color: rgba(16,185,129,0.26);
    }
    .status-chip.partial {
      color: #b45309;
      background: rgba(251,146,60,0.14);
      border-color: rgba(251,146,60,0.3);
    }
    .status-chip.overpaid {
      color: #b91c1c;
      background: rgba(239,68,68,0.14);
      border-color: rgba(239,68,68,0.3);
    }
    .revealable {
      overflow: hidden;
      max-height: 120px;
      opacity: 1;
      transform: translateY(0);
      transition: max-height 180ms ease, opacity 180ms ease, transform 180ms ease, margin 180ms ease;
    }
    .revealable.is-hidden {
      max-height: 0;
      opacity: 0;
      transform: translateY(-4px);
      margin-top: -6px;
      pointer-events: none;
    }
    .overdue-tip {
      color: #f97316;
      font-weight: 600;
    }
    .pending-tip {
      color: #60a5fa;
      font-weight: 600;
    }
    .payment-preview {
      margin-top: 6px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 10px;
      display: grid;
      gap: 6px;
      background: rgba(255,255,255,0.01);
    }
    .payment-preview .row {
      font-size: 12px;
    }
    .status-preview-stack {
      display: inline-grid;
      justify-items: end;
      gap: 4px;
      text-align: right;
    }
    .status-remaining {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      opacity: 0.9;
    }
    .amount-state-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
      width: fit-content;
    }
    .amount-state-badge.full {
      color: #047857;
      border-color: rgba(16,185,129,0.26);
      background: rgba(16,185,129,0.12);
    }
    .amount-state-badge.partial {
      color: #b45309;
      border-color: rgba(251,146,60,0.3);
      background: rgba(251,146,60,0.12);
    }
    .amount-state-badge.overpaid {
      color: #b91c1c;
      border-color: rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.12);
    }
    .error {
      color: var(--danger);
      font-size: 12px;
      min-height: 18px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 14px;
      background: #151c45;
      color: var(--ink);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary {
      border-color: transparent;
      background: linear-gradient(135deg, #58d6c1, #39b5a2);
      color: #052622;
    }
    @media (max-width: 760px) {
      body { padding: 12px; }
      .shell { padding: 14px; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="head">
      <div>
        <h1>Create Payment In</h1>
        <div class="muted">Record payment in a dedicated page, then return to Payment In list.</div>
      </div>
      <button type="button" id="back-btn">Back to Payment In</button>
    </div>

    <form id="payment-in-form">
      <section class="form-section">
        <h2 class="form-section-title">1. Customer + Invoice</h2>
        <div class="grid-2">
          <label>Customer
            <select id="customer" required>
              <option value="">Select customer</option>
            </select>
          </label>
          <label>Invoice
            <select id="invoice" required>
              <option value="">Select invoice</option>
            </select>
          </label>
        </div>
        <div class="summary invoice-info">
          <div class="row"><span>Invoice Total</span><strong id="invoice-total">INR 0</strong></div>
          <div class="row"><span>Amount Due</span><strong id="invoice-due">INR 0</strong></div>
        </div>
      </section>

      <section class="form-section">
        <h2 class="form-section-title">2. Amount + Mode</h2>
        <div class="grid-2">
          <label>Payment amount
            <input type="number" id="amount" min="0" step="0.01" placeholder="5000" required />
            <span class="form-help">Enter amount to record payment</span>
            <div class="payment-preview" id="payment-preview">
              <div class="row"><span>Paid amount</span><strong id="preview-paid">₹0</strong></div>
              <div class="row"><span>Remaining amount</span><strong id="preview-remaining">₹0</strong></div>
              <div class="row"><span>Status</span><strong id="preview-status">-</strong></div>
            </div>
          </label>
          <label>Payment mode
            <select id="mode">
              <option value="cash">Cash</option>
              <option value="upi">UPI</option>
              <option value="bank">Bank</option>
              <option value="cheque">Cheque</option>
            </select>
          </label>
        </div>
        <div id="amount-hint" class="form-hint"></div>
        <div id="mode-hint" class="form-hint"></div>
      </section>

      <section class="form-section">
        <h2 class="form-section-title">3. Account + Date</h2>
        <div class="grid-2">
          <label id="bank-account-wrap" class="revealable is-hidden" aria-hidden="true">Deposit account
            <select id="bank-account">
              <option value="">Auto (first bank account)</option>
            </select>
            <span class="form-help">Where this payment will be recorded</span>
          </label>
          <label>Payment date
            <input type="date" id="date" />
          </label>
        </div>
      </section>

      <section class="form-section">
        <h2 class="form-section-title">4. Notes + Status</h2>
        <div class="grid-2">
          <label>Transaction Reference (Optional)
            <input type="text" id="notes" placeholder="UTR / transaction ref" />
          </label>
          <div class="summary">
            <div class="row"><span>Status after payment</span><strong id="status-preview">-</strong></div>
            <div id="smart-hint" class="form-hint"></div>
          </div>
        </div>
      </section>

      <div class="error" id="error"></div>
      <div class="actions">
        <button type="submit" class="primary" id="save-btn">Save Payment</button>
        <button type="button" id="cancel-btn">Cancel</button>
      </div>
    </form>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = 'metrox_taxinvoo_demo_state';
      const BACKUP_KEY = 'metrox_taxinvoo_demo_state_backup';
      const LAST_GOOD_KEY = 'metrox_taxinvoo_last_good_state';
      const BUSINESS_PROFILES_KEY = 'metrox_business_profiles_v1';
      const ACTIVE_BUSINESS_PROFILE_KEY = 'metrox_active_business_profile_v1';
      const SCOPED_STATE_KEY_SEPARATOR = '__';
      const PAYMENT_IN_FORM_FOCUS_KEY = 'metrox_open_payment_in_form';
      const PAYMENT_IN_GENERATION_CONTEXT_KEY = 'metrox_payment_in_generation_context_v1';
      const target = '../app/index.html#/sales-transactions';
      const fmt = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 2 });
      const STORAGE_SAVE_ERROR_MESSAGE = 'Could not save changes because browser storage is full. Clear old data and try again.';

      const theme = localStorage.getItem('Metrox TaxInvoo_theme');
      if (theme === 'light') document.body.classList.add('light');

      const customerEl = document.getElementById('customer');
      const invoiceEl = document.getElementById('invoice');
      const invoiceTotalEl = document.getElementById('invoice-total');
      const invoiceDueEl = document.getElementById('invoice-due');
      const amountEl = document.getElementById('amount');
      const modeEl = document.getElementById('mode');
      const dateEl = document.getElementById('date');
      const notesEl = document.getElementById('notes');
      const bankAccountWrap = document.getElementById('bank-account-wrap');
      const bankAccountEl = document.getElementById('bank-account');
      const statusEl = document.getElementById('status-preview');
      const amountHintEl = document.getElementById('amount-hint');
      const modeHintEl = document.getElementById('mode-hint');
      const smartHintEl = document.getElementById('smart-hint');
      const previewPaidEl = document.getElementById('preview-paid');
      const previewRemainingEl = document.getElementById('preview-remaining');
      const previewStatusEl = document.getElementById('preview-status');
      const errorEl = document.getElementById('error');
      const saveBtn = document.getElementById('save-btn');

      dateEl.value = new Date().toISOString().slice(0, 10);

      function goBack() {
        try { localStorage.setItem(PAYMENT_IN_FORM_FOCUS_KEY, '1'); } catch (_) {}
        window.location.href = target;
      }

      document.getElementById('back-btn').addEventListener('click', goBack);
      document.getElementById('cancel-btn').addEventListener('click', goBack);

      function normalizeBusinessStorageId(value) {
        return String(value || '').trim().replace(/[^a-zA-Z0-9_-]/g, '');
      }

      function parseMoney(value) {
        if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
        if (value == null) return 0;
        const cleaned = String(value).replace(/[^0-9.-]/g, '');
        const parsed = Number(cleaned);
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function toAmount(value) {
        return Math.max(0, Math.round(parseMoney(value) * 100) / 100);
      }

      function toPaise(value) {
        return Math.max(0, Math.round(toAmount(value) * 100));
      }

      function resolvePaymentAgainstDue(amount, due) {
        const amountPaise = toPaise(amount);
        const duePaise = toPaise(due);
        const diffPaise = amountPaise - duePaise;
        if (diffPaise <= 0) {
          return {
            exceeds: false,
            amount: toAmount(amountPaise / 100),
            due: toAmount(duePaise / 100),
            overBy: 0
          };
        }
        // Accept +/- 1 paise drift caused by floating conversions.
        if (diffPaise <= 1) {
          return {
            exceeds: false,
            amount: toAmount(duePaise / 100),
            due: toAmount(duePaise / 100),
            overBy: 0
          };
        }
        return {
          exceeds: true,
          amount: toAmount(amountPaise / 100),
          due: toAmount(duePaise / 100),
          overBy: toAmount(diffPaise / 100)
        };
      }

      function getProfileCandidates() {
        const ids = [];
        const pushId = (value) => {
          const safe = normalizeBusinessStorageId(value);
          if (safe && !ids.includes(safe)) ids.push(safe);
        };
        pushId(localStorage.getItem(ACTIVE_BUSINESS_PROFILE_KEY));
        pushId(localStorage.getItem('activeBusinessId'));
        try {
          const profiles = JSON.parse(localStorage.getItem(BUSINESS_PROFILES_KEY) || '[]');
          if (Array.isArray(profiles)) {
            profiles.forEach((profile) => pushId(profile?.id));
          }
        } catch (_) {}
        return ids;
      }

      let resolvedProfileId = '';

      function getScopedLocalStateKeys(profileId = resolvedProfileId) {
        const safeProfileId = normalizeBusinessStorageId(profileId);
        if (!safeProfileId) {
          return { primary: STORAGE_KEY, backup: BACKUP_KEY, lastGood: LAST_GOOD_KEY };
        }
        return {
          primary: `${STORAGE_KEY}${SCOPED_STATE_KEY_SEPARATOR}${safeProfileId}`,
          backup: `${BACKUP_KEY}${SCOPED_STATE_KEY_SEPARATOR}${safeProfileId}`,
          lastGood: `${LAST_GOOD_KEY}${SCOPED_STATE_KEY_SEPARATOR}${safeProfileId}`
        };
      }

      function parseStoredPayload(raw) {
        if (!raw) return null;
        try {
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === 'object' ? parsed : null;
        } catch (_) {
          return null;
        }
      }

      function countStoredRecords(payload) {
        if (!payload || typeof payload !== 'object') return 0;
        const counters = [
          Array.isArray(payload.invoices) ? payload.invoices.length : 0,
          Array.isArray(payload.payments) ? payload.payments.length : 0,
          payload.customers && typeof payload.customers === 'object' ? Object.keys(payload.customers).length : 0
        ];
        return counters.reduce((sum, value) => sum + value, 0);
      }

      function parseState() {
        const activeId = normalizeBusinessStorageId(localStorage.getItem(ACTIVE_BUSINESS_PROFILE_KEY));
        const candidateIds = getProfileCandidates();
        if (activeId && !candidateIds.includes(activeId)) candidateIds.unshift(activeId);
        const keyRows = [];
        const addKeyRow = (key, profileId = '') => {
          if (!keyRows.some((row) => row.key === key)) {
            keyRows.push({ key, profileId: normalizeBusinessStorageId(profileId) });
          }
        };

        candidateIds.forEach((id) => {
          const scoped = getScopedLocalStateKeys(id);
          addKeyRow(scoped.primary, id);
          addKeyRow(scoped.backup, id);
          addKeyRow(scoped.lastGood, id);
        });
        addKeyRow(STORAGE_KEY, activeId);
        addKeyRow(BACKUP_KEY, activeId);
        addKeyRow(LAST_GOOD_KEY, activeId);

        let best = null;
        keyRows.forEach((row) => {
          const payload = parseStoredPayload(localStorage.getItem(row.key));
          if (!payload) return;
          const records = countStoredRecords(payload);
          const updatedAt = Date.parse(String(payload?._meta?.updated_at || '')) || 0;
          const ownerId = normalizeBusinessStorageId(payload?._meta?.business_id || '');
          const ownerMatches = !!(activeId && ownerId && ownerId === activeId);
          const score = (records * 1000000000) + (ownerMatches ? 1000000 : 0) + updatedAt;
          if (!best || score > best.score) {
            best = {
              score,
              payload,
              profileId: ownerId || row.profileId || activeId
            };
          }
        });

        resolvedProfileId = normalizeBusinessStorageId(best?.profileId || activeId || candidateIds[0] || '');
        return best?.payload && typeof best.payload === 'object' ? best.payload : {};
      }

      function readLaunchContextPayload() {
        try {
          const raw = sessionStorage.getItem(PAYMENT_IN_GENERATION_CONTEXT_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== 'object') return null;
          const businessId = normalizeBusinessStorageId(parsed.businessId || localStorage.getItem(ACTIVE_BUSINESS_PROFILE_KEY));
          return {
            customers: parsed.customers && typeof parsed.customers === 'object' ? parsed.customers : {},
            invoices: Array.isArray(parsed.invoices) ? parsed.invoices : [],
            payments: Array.isArray(parsed.payments) ? parsed.payments : [],
            cashBank: parsed.cashBank && typeof parsed.cashBank === 'object' ? parsed.cashBank : {},
            _meta: {
              business_id: businessId,
              updated_at: String(parsed.createdAt || new Date().toISOString())
            }
          };
        } catch (_) {
          return null;
        }
      }

      function isQuotaError(err) {
        return String(err?.name || '').toLowerCase() === 'quotaexceedederror'
          || /quota/i.test(String(err?.message || ''));
      }

      function saveState(next) {
        const payload = next && typeof next === 'object' ? next : {};
        payload._meta = {
          ...(payload._meta || {}),
          business_id: normalizeBusinessStorageId(payload?._meta?.business_id || resolvedProfileId || localStorage.getItem(ACTIVE_BUSINESS_PROFILE_KEY)),
          updated_at: new Date().toISOString()
        };
        const serialized = JSON.stringify(payload);
        const scoped = getScopedLocalStateKeys(payload._meta.business_id);
        const writeState = (writeLastGood = true) => {
          localStorage.setItem(scoped.primary, serialized);
          localStorage.setItem(scoped.backup, serialized);
          if (writeLastGood) localStorage.setItem(scoped.lastGood, serialized);
          else localStorage.removeItem(scoped.lastGood);
        };

        try {
          writeState(true);
          return true;
        } catch (firstErr) {
          if (!isQuotaError(firstErr)) {
            console.error('Failed to save payment-in data.', firstErr);
            return false;
          }
          try {
            writeState(false);
            return true;
          } catch (secondErr) {
            if (!isQuotaError(secondErr)) {
              console.error('Failed to save payment-in data.', secondErr);
              return false;
            }
            try {
              localStorage.removeItem(scoped.backup);
              localStorage.removeItem(scoped.lastGood);
              localStorage.setItem(scoped.primary, serialized);
              return true;
            } catch (finalErr) {
              console.warn('Browser storage is full. Latest payment-in changes remain only in this tab session.', finalErr);
              return false;
            }
          }
        }
      }

      function getInvoiceCollectionTarget(inv) {
        if (!inv || typeof inv !== 'object') return 0;
        const explicit = parseMoney(inv.netReceivable);
        const baseTarget = explicit > 0 ? toAmount(explicit) : toAmount(parseMoney(inv.total) - parseMoney(inv.tdsAmount));
        const invoiceId = String(inv.id || '').trim();
        if (!invoiceId) return baseTarget;
        const isSalesReturnActive = (entry) => {
          const status = String(entry?.status || entry?.legacyStatus || '').trim().toLowerCase();
          return status !== 'draft' && status !== 'cancelled';
        };
        const isCreditNoteActive = (entry) => String(entry?.status || '').trim().toLowerCase() !== 'cancelled';
        const isLinkedSalesReturnCreditNote = (entry) => {
          if (String(entry?.sourceType || '').trim().toLowerCase() === 'sales_return') return true;
          if (String(entry?.linkedSalesReturnId || '').trim()) return true;
          const noteId = String(entry?.id || '').trim();
          if (!noteId) return false;
          return (state.salesReturns || []).some((sr) => {
            if (String(sr?.creditNoteNumber || '').trim() !== noteId) return false;
            const sameInvoice = String(sr?.invoiceId || '').trim() === String(entry?.invoiceId || '').trim();
            return sameInvoice;
          });
        };
        const salesReturnAdjustments = (state.salesReturns || [])
          .filter((entry) => String(entry?.invoiceId || '').trim() === invoiceId)
          .filter((entry) => isSalesReturnActive(entry))
          .reduce((sum, entry) => sum + parseMoney(entry?.amount), 0);
        const manualCreditAdjustments = (state.creditNotes || [])
          .filter((entry) => String(entry?.invoiceId || '').trim() === invoiceId)
          .filter((entry) => !isLinkedSalesReturnCreditNote(entry))
          .filter((entry) => isCreditNoteActive(entry))
          .reduce((sum, entry) => sum + parseMoney(entry?.amount), 0);
        return Math.max(0, toAmount(baseTarget - salesReturnAdjustments - manualCreditAdjustments));
      }

      function getInvoicePaidAmount(inv, payments = []) {
        const fromInvoice = toAmount(inv?.paidAmount);
        const invoiceId = String(inv?.id || '').trim();
        if (!invoiceId) return fromInvoice;
        const fromPayments = toAmount((Array.isArray(payments) ? payments : [])
          .filter((payment) => String(payment?.invoiceId || '').trim() === invoiceId)
          .reduce((sum, payment) => sum + parseMoney(payment?.amount), 0));
        return Math.max(fromInvoice, fromPayments);
      }

      function getInvoiceDue(inv, payments = []) {
        return Math.max(0, toAmount(getInvoiceCollectionTarget(inv) - getInvoicePaidAmount(inv, payments)));
      }

      function setInvoiceStatus(inv, payments = []) {
        const target = getInvoiceCollectionTarget(inv);
        const paid = getInvoicePaidAmount(inv, payments);
        if (paid >= target && target > 0) inv.status = 'Paid';
        else if (paid > 0) inv.status = 'Partial';
        else inv.status = 'Pending';
      }

      const persistedState = parseState();
      const launchContextState = readLaunchContextPayload();
      const useLaunchContext = countStoredRecords(launchContextState) >= countStoredRecords(persistedState);
      const state = useLaunchContext ? launchContextState : persistedState;
      if (useLaunchContext) {
        resolvedProfileId = normalizeBusinessStorageId(state?._meta?.business_id || resolvedProfileId);
      }
      state.customers = state.customers && typeof state.customers === 'object' ? state.customers : {};
      state.invoices = Array.isArray(state.invoices) ? state.invoices : [];
      state.payments = Array.isArray(state.payments) ? state.payments : [];
      state.salesReturns = Array.isArray(state.salesReturns) ? state.salesReturns : [];
      state.creditNotes = Array.isArray(state.creditNotes) ? state.creditNotes : [];
      state.cashBank = state.cashBank && typeof state.cashBank === 'object' ? state.cashBank : {};
      state.cashBank.accounts = Array.isArray(state.cashBank.accounts) ? state.cashBank.accounts : [];
      state.cashBank.defaultBankAccountId = String(state.cashBank.defaultBankAccountId || '');

      function normalizeMode(value) {
        const mode = String(value || '').trim().toLowerCase();
        if (mode === 'cash') return 'cash';
        if (mode === 'bank' || mode === 'upi' || mode === 'cheque' || mode === 'card') return 'bank';
        return mode || 'cash';
      }

      function renderBankAccounts() {
        if (!bankAccountEl) return;
        const opts = ['<option value="">Auto (first bank account)</option>']
          .concat((state.cashBank.accounts || []).map((acc) => `<option value="${acc.id}">${acc.accountName || 'Bank Account'}</option>`));
        bankAccountEl.innerHTML = opts.join('');
      }

      function getDefaultBankAccountId() {
        if (state.cashBank.defaultBankAccountId && (state.cashBank.accounts || []).some((a) => a.id === state.cashBank.defaultBankAccountId)) {
          return state.cashBank.defaultBankAccountId;
        }
        return state.cashBank.accounts?.[0]?.id || '';
      }

      function syncBankAccountVisibility() {
        if (!bankAccountWrap) return;
        const bankMode = normalizeMode(modeEl.value) === 'bank';
        bankAccountWrap.classList.toggle('is-hidden', !bankMode);
        bankAccountWrap.setAttribute('aria-hidden', bankMode ? 'false' : 'true');
        const mode = String(modeEl.value || '').toLowerCase();
        if (!modeHintEl) return;
        if (mode === 'cash') {
          modeHintEl.textContent = 'Cash selected - no extra fields needed.';
          modeHintEl.className = 'form-hint';
          return;
        }
        if (mode === 'bank') {
          modeHintEl.textContent = 'Bank selected - add transaction reference for easier reconciliation.';
          modeHintEl.className = 'form-hint info';
          return;
        }
        if (mode === 'upi') {
          modeHintEl.textContent = 'UPI selected - add UTR in Transaction Reference.';
          modeHintEl.className = 'form-hint info';
          return;
        }
        modeHintEl.textContent = 'Add instrument/reference details in Transaction Reference for this payment mode.';
        modeHintEl.className = 'form-hint';
      }

      const customers = Array.from(new Set([
        ...Object.keys(state.customers)
          .filter((name) => !state.customers[name]?.deleted),
        ...state.invoices
          .map((inv) => String(inv?.customer || '').trim())
          .filter(Boolean)
      ])).sort((a, b) => a.localeCompare(b));

      const openInvoices = state.invoices.filter((inv) => {
        const isCancelled = String(inv?.status || '').trim().toLowerCase() === 'cancelled';
        return !isCancelled && getInvoiceDue(inv, state.payments) > 0;
      });

      if (!openInvoices.length) {
        saveBtn.disabled = true;
        errorEl.textContent = 'No open invoices found. Create an invoice or record pending dues first.';
      }

      customerEl.innerHTML = ['<option value="">Select customer</option>']
        .concat(customers.map((name) => `<option value="${name}">${name}</option>`))
        .join('');

      function renderInvoiceOptions(customerName) {
        const rows = openInvoices
          .filter((inv) => !customerName || inv.customer === customerName)
          .sort((a, b) => String(a.id || '').localeCompare(String(b.id || '')));
        invoiceEl.innerHTML = ['<option value="">Select invoice</option>']
          .concat(rows.map((inv) => {
            const due = getInvoiceDue(inv, state.payments);
            return `<option value="${inv.id}">${inv.id} | ${inv.customer} | Due INR ${fmt.format(due)}</option>`;
          }))
          .join('');
      }

      function selectedInvoice() {
        const id = invoiceEl.value;
        return state.invoices.find((inv) => String(inv.id) === String(id));
      }

      function syncPreview() {
        const inv = selectedInvoice();
        if (!inv) {
          invoiceTotalEl.textContent = '₹0';
          invoiceDueEl.textContent = '₹0';
          statusEl.textContent = '-';
          if (previewPaidEl) previewPaidEl.textContent = '₹0';
          if (previewRemainingEl) previewRemainingEl.textContent = '₹0';
          if (previewStatusEl) previewStatusEl.textContent = '-';
          if (amountHintEl) amountHintEl.textContent = '';
          if (smartHintEl) smartHintEl.textContent = '';
          errorEl.textContent = '';
          saveBtn.textContent = 'Save Payment';
          return;
        }
        const total = getInvoiceCollectionTarget(inv) + toAmount(inv.tdsAmount);
        const due = getInvoiceDue(inv, state.payments);
        invoiceTotalEl.textContent = `₹${fmt.format(total)}`;
        invoiceDueEl.textContent = `₹${fmt.format(due)}`;

        const selectedInvoiceId = String(inv.id || '');
        if (invoiceEl.dataset.lastSyncedInvoice !== selectedInvoiceId) {
          amountEl.value = due.toFixed(2);
          invoiceEl.dataset.lastSyncedInvoice = selectedInvoiceId;
        } else if (!amountEl.value || Number(amountEl.value) <= 0) {
          amountEl.value = due.toFixed(2);
        }

        const amount = toAmount(amountEl.value);
        const paymentDecision = resolvePaymentAgainstDue(amount, due);
        const safeAmount = paymentDecision.amount;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const dueDateRaw = String(inv.dueDate || '').trim();
        const dueDate = dueDateRaw ? new Date(`${dueDateRaw}T00:00:00`) : null;
        const isOverdue = !!(dueDate && !Number.isNaN(dueDate.getTime()) && due > 0 && dueDate.getTime() < today.getTime());
        const smartTips = [];
        if (isOverdue) smartTips.push('⚠ This invoice is overdue - consider collecting full payment');

        if (paymentDecision.exceeds) {
          const extra = paymentDecision.overBy;
          statusEl.innerHTML = `<span class="status-preview-stack"><span class="status-chip overpaid">Overpaid</span><span class="status-remaining">₹${fmt.format(extra)} extra</span></span>`;
          if (previewPaidEl) previewPaidEl.textContent = `₹${fmt.format(safeAmount)}`;
          if (previewRemainingEl) previewRemainingEl.textContent = '₹0';
          if (previewStatusEl) previewStatusEl.innerHTML = '<span class="status-chip overpaid">Overpaid</span>';
          if (amountHintEl) {
            amountHintEl.innerHTML = `<span class="amount-state-badge overpaid">Overpayment</span> Warning: amount exceeds due by ₹${fmt.format(extra)}.`;
            amountHintEl.className = 'form-hint warn';
          }
          errorEl.textContent = 'Payment amount cannot exceed invoice due.';
          saveBtn.textContent = 'Save Payment';
        } else if (safeAmount <= 0) {
          statusEl.textContent = '-';
          if (previewPaidEl) previewPaidEl.textContent = '₹0';
          if (previewRemainingEl) previewRemainingEl.textContent = `₹${fmt.format(due)}`;
          if (previewStatusEl) previewStatusEl.textContent = '-';
          if (amountHintEl) {
            amountHintEl.textContent = '';
            amountHintEl.className = 'form-hint';
          }
          errorEl.textContent = '';
          saveBtn.textContent = 'Save Payment';
        } else {
          if (safeAmount !== amount) amountEl.value = safeAmount.toFixed(2);
          const remaining = Math.max(0, toAmount(due - safeAmount));
          if (previewPaidEl) previewPaidEl.textContent = `₹${fmt.format(safeAmount)}`;
          if (previewRemainingEl) previewRemainingEl.textContent = `₹${fmt.format(remaining)}`;
          if (remaining === 0) {
            statusEl.innerHTML = '<span class="status-preview-stack"><span class="status-chip paid">Paid</span><span class="status-remaining">₹0 remaining</span></span>';
            if (previewStatusEl) previewStatusEl.innerHTML = '<span class="status-chip paid">Paid</span>';
            if (amountHintEl) {
              amountHintEl.innerHTML = '<span class="amount-state-badge full">Full Payment</span>';
              amountHintEl.className = 'form-hint';
            }
            saveBtn.textContent = 'Mark as Paid';
          } else {
            statusEl.innerHTML = `<span class="status-preview-stack"><span class="status-chip partial">Partial</span><span class="status-remaining">₹${fmt.format(remaining)} remaining</span></span>`;
            if (previewStatusEl) previewStatusEl.innerHTML = '<span class="status-chip partial">Partial</span>';
            if (amountHintEl) {
              amountHintEl.innerHTML = `<span class="amount-state-badge partial">Partial Payment</span> ₹${fmt.format(remaining)} will remain pending.`;
              amountHintEl.className = 'form-hint';
            }
            saveBtn.textContent = 'Record Partial Payment';
            smartTips.push('💡 Remaining amount will stay as pending');
          }
          errorEl.textContent = '';
        }
        if (smartHintEl) {
          smartHintEl.innerHTML = smartTips.map((tip) => {
            if (tip.includes('overdue')) return `<span class="overdue-tip">${tip}</span>`;
            return `<span class="pending-tip">${tip}</span>`;
          }).join('<br />');
        }
      }

      customerEl.addEventListener('change', () => {
        renderInvoiceOptions(customerEl.value);
        syncPreview();
      });

      invoiceEl.addEventListener('change', () => {
        const inv = selectedInvoice();
        if (inv && customerEl.value !== inv.customer) {
          customerEl.value = inv.customer;
        }
        syncPreview();
      });

      amountEl.addEventListener('input', syncPreview);
      modeEl.addEventListener('change', syncBankAccountVisibility);

      renderBankAccounts();
      renderInvoiceOptions('');
      syncPreview();
      syncBankAccountVisibility();

      document.getElementById('payment-in-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const inv = selectedInvoice();
        const amount = toAmount(amountEl.value);
        const date = dateEl.value || new Date().toISOString().slice(0, 10);

        if (!inv) {
          errorEl.textContent = 'Select an invoice.';
          return;
        }
        const due = getInvoiceDue(inv, state.payments);
        if (amount <= 0) {
          errorEl.textContent = 'Amount must be greater than 0.';
          return;
        }
        const paymentDecision = resolvePaymentAgainstDue(amount, due);
        if (paymentDecision.exceeds) {
          errorEl.textContent = 'Payment amount cannot exceed invoice due.';
          return;
        }
        const appliedAmount = paymentDecision.amount;

        saveBtn.disabled = true;
        inv.paidAmount = toAmount(getInvoicePaidAmount(inv, state.payments) + appliedAmount);
        setInvoiceStatus(inv, state.payments);
        state.payments.push({
          id: `PAY-${Date.now()}`,
          invoiceId: inv.id,
          customer: inv.customer,
          amount: appliedAmount,
          mode: modeEl.value || 'cash',
          bankAccountId: normalizeMode(modeEl.value) === 'bank' ? (bankAccountEl.value || getDefaultBankAccountId()) : '',
          date,
          notes: String(notesEl.value || '').trim()
        });

        const saved = saveState(state);
        if (!saved) {
          errorEl.textContent = STORAGE_SAVE_ERROR_MESSAGE;
          saveBtn.disabled = false;
          return;
        }
        goBack();
      });
    })();
  </script>
</body>
</html>
