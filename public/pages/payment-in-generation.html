<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../assets/poppins.css" />
  <link rel="stylesheet" href="../assets/light-theme-generation-overrides.css" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Metrox TaxInvoo - Create Payment In</title>
  <meta name="description" content="Dedicated Payment In creation form." />
  <style>
    :root {
      --bg: #10163b;
      --panel: rgba(22, 29, 74, 0.72);
      --line: rgba(214,222,255,0.16);
      --ink: #eef2ff;
      --muted: #b2badf;
      --accent: #58d6c1;
      --danger: #ff8f8f;
      --input: #151c45;
    }
    * { box-sizing: border-box; }
    body.light {
      --bg: #f4f7ff;
      --panel: #ffffff;
      --line: rgba(15,23,42,0.15);
      --ink: #0f172a;
      --muted: rgba(15,23,42,0.66);
      --accent: #0ea5a0;
      --danger: #dc2626;
      --input: #ffffff;
    }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 520px at 20% -10%, rgba(105,215,216,0.18), transparent),
        radial-gradient(880px 500px at 110% 5%, rgba(106,77,245,0.14), transparent),
        linear-gradient(180deg, #0a0d16, var(--bg));
      display: grid;
      place-items: center;
    }
    .shell {
      width: min(860px, 100%);
      background: color-mix(in oklab, var(--panel) 90%, transparent);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      display: grid;
      gap: 16px;
      backdrop-filter: blur(6px);
    }
    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.01em;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    form {
      display: grid;
      gap: 14px;
    }
    .form-section {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      gap: 10px;
      background: rgba(255,255,255,0.02);
    }
    .form-section-title {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    label {
      display: grid;
      gap: 7px;
      font-size: 13px;
      color: var(--muted);
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: var(--input);
      color: var(--ink);
      font: inherit;
      outline: none;
    }
    textarea { min-height: 82px; resize: vertical; }
    .summary {
      display: grid;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.02);
    }
    .summary.invoice-info {
      background: rgba(88,214,193,0.08);
      border-color: rgba(88,214,193,0.28);
    }
    .form-help {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
      opacity: 0.82;
    }
    .form-hint {
      font-size: 11px;
      line-height: 1.4;
      color: var(--muted);
      min-height: 16px;
      opacity: 0.82;
    }
    .form-hint.warn {
      color: #f97316;
    }
    .form-hint.info {
      color: #60a5fa;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
    }
    .row strong { color: var(--ink); }
    .status-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .status-chip.paid {
      color: #047857;
      background: rgba(16,185,129,0.14);
      border-color: rgba(16,185,129,0.26);
    }
    .status-chip.partial {
      color: #b45309;
      background: rgba(251,146,60,0.14);
      border-color: rgba(251,146,60,0.3);
    }
    .status-chip.overpaid {
      color: #b91c1c;
      background: rgba(239,68,68,0.14);
      border-color: rgba(239,68,68,0.3);
    }
    .revealable {
      overflow: hidden;
      max-height: 120px;
      opacity: 1;
      transform: translateY(0);
      transition: max-height 180ms ease, opacity 180ms ease, transform 180ms ease, margin 180ms ease;
    }
    .revealable.is-hidden {
      max-height: 0;
      opacity: 0;
      transform: translateY(-4px);
      margin-top: -6px;
      pointer-events: none;
    }
    .overdue-tip {
      color: #f97316;
      font-weight: 600;
    }
    .pending-tip {
      color: #60a5fa;
      font-weight: 600;
    }
    .payment-preview {
      margin-top: 6px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 10px;
      display: grid;
      gap: 6px;
      background: rgba(255,255,255,0.01);
    }
    .payment-preview .row {
      font-size: 12px;
    }
    .status-preview-stack {
      display: inline-grid;
      justify-items: end;
      gap: 4px;
      text-align: right;
    }
    .status-remaining {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      opacity: 0.9;
    }
    .amount-state-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
      width: fit-content;
    }
    .amount-state-badge.full {
      color: #047857;
      border-color: rgba(16,185,129,0.26);
      background: rgba(16,185,129,0.12);
    }
    .amount-state-badge.partial {
      color: #b45309;
      border-color: rgba(251,146,60,0.3);
      background: rgba(251,146,60,0.12);
    }
    .amount-state-badge.overpaid {
      color: #b91c1c;
      border-color: rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.12);
    }
    .error {
      color: var(--danger);
      font-size: 12px;
      min-height: 18px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 14px;
      background: #151c45;
      color: var(--ink);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary {
      border-color: transparent;
      background: linear-gradient(135deg, #58d6c1, #39b5a2);
      color: #052622;
    }
    @media (max-width: 760px) {
      body { padding: 12px; }
      .shell { padding: 14px; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="head">
      <div>
        <h1>Create Payment In</h1>
        <div class="muted">Record payment in a dedicated page, then return to Payment In list.</div>
      </div>
      <button type="button" id="back-btn">Back to Payment In</button>
    </div>

    <form id="payment-in-form">
      <section class="form-section">
        <h2 class="form-section-title">1. Customer + Invoice</h2>
        <div class="grid-2">
          <label>Customer
            <select id="customer" required>
              <option value="">Select customer</option>
            </select>
          </label>
          <label>Invoice
            <select id="invoice" required>
              <option value="">Select invoice</option>
            </select>
          </label>
        </div>
        <div class="summary invoice-info">
          <div class="row"><span>Invoice Total</span><strong id="invoice-total">INR 0</strong></div>
          <div class="row"><span>Amount Due</span><strong id="invoice-due">INR 0</strong></div>
        </div>
      </section>

      <section class="form-section">
        <h2 class="form-section-title">2. Amount + Mode</h2>
        <div class="grid-2">
          <label>Payment amount
            <input type="number" id="amount" min="0" step="0.01" placeholder="5000" required />
            <span class="form-help">Enter amount to record payment</span>
            <div class="payment-preview" id="payment-preview">
              <div class="row"><span>Paid amount</span><strong id="preview-paid">₹0</strong></div>
              <div class="row"><span>Remaining amount</span><strong id="preview-remaining">₹0</strong></div>
              <div class="row"><span>Status</span><strong id="preview-status">-</strong></div>
            </div>
          </label>
          <label>Payment mode
            <select id="mode">
              <option value="cash">Cash</option>
              <option value="upi">UPI</option>
              <option value="bank">Bank</option>
              <option value="cheque">Cheque</option>
            </select>
          </label>
        </div>
        <div id="amount-hint" class="form-hint"></div>
        <div id="mode-hint" class="form-hint"></div>
      </section>

      <section class="form-section">
        <h2 class="form-section-title">3. Account + Date</h2>
        <div class="grid-2">
          <label id="bank-account-wrap" class="revealable is-hidden" aria-hidden="true">Deposit account
            <select id="bank-account">
              <option value="">Auto (first bank account)</option>
            </select>
            <span class="form-help">Where this payment will be recorded</span>
          </label>
          <label>Payment date
            <input type="date" id="date" />
          </label>
        </div>
      </section>

      <section class="form-section">
        <h2 class="form-section-title">4. Notes + Status</h2>
        <div class="grid-2">
          <label>Transaction Reference (Optional)
            <input type="text" id="notes" placeholder="UTR / transaction ref" />
          </label>
          <div class="summary">
            <div class="row"><span>Status after payment</span><strong id="status-preview">-</strong></div>
            <div id="smart-hint" class="form-hint"></div>
          </div>
        </div>
      </section>

      <div class="error" id="error"></div>
      <div class="actions">
        <button type="submit" class="primary" id="save-btn">Save Payment</button>
        <button type="button" id="cancel-btn">Cancel</button>
      </div>
    </form>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = 'metrox_taxinvoo_demo_state';
      const BACKUP_KEY = 'metrox_taxinvoo_demo_state_backup';
      const LAST_GOOD_KEY = 'metrox_taxinvoo_last_good_state';
      const ACTIVE_BUSINESS_PROFILE_KEY = 'metrox_active_business_profile_v1';
      const SCOPED_STATE_KEY_SEPARATOR = '__';
      const PAYMENT_IN_FORM_FOCUS_KEY = 'metrox_open_payment_in_form';
      const target = '../app/index.html#/sales-transactions';
      const fmt = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 2 });

      const theme = localStorage.getItem('Metrox TaxInvoo_theme');
      if (theme === 'light') document.body.classList.add('light');

      const customerEl = document.getElementById('customer');
      const invoiceEl = document.getElementById('invoice');
      const invoiceTotalEl = document.getElementById('invoice-total');
      const invoiceDueEl = document.getElementById('invoice-due');
      const amountEl = document.getElementById('amount');
      const modeEl = document.getElementById('mode');
      const dateEl = document.getElementById('date');
      const notesEl = document.getElementById('notes');
      const bankAccountWrap = document.getElementById('bank-account-wrap');
      const bankAccountEl = document.getElementById('bank-account');
      const statusEl = document.getElementById('status-preview');
      const amountHintEl = document.getElementById('amount-hint');
      const modeHintEl = document.getElementById('mode-hint');
      const smartHintEl = document.getElementById('smart-hint');
      const previewPaidEl = document.getElementById('preview-paid');
      const previewRemainingEl = document.getElementById('preview-remaining');
      const previewStatusEl = document.getElementById('preview-status');
      const errorEl = document.getElementById('error');
      const saveBtn = document.getElementById('save-btn');

      dateEl.value = new Date().toISOString().slice(0, 10);

      function goBack() {
        try { localStorage.setItem(PAYMENT_IN_FORM_FOCUS_KEY, '1'); } catch (_) {}
        window.location.href = target;
      }

      document.getElementById('back-btn').addEventListener('click', goBack);
      document.getElementById('cancel-btn').addEventListener('click', goBack);

      function getScopedLocalStateKeys() {
        const profileId = String(localStorage.getItem(ACTIVE_BUSINESS_PROFILE_KEY) || '').trim().replace(/[^a-zA-Z0-9_-]/g, '');
        if (!profileId) {
          return { primary: STORAGE_KEY, backup: BACKUP_KEY, lastGood: LAST_GOOD_KEY };
        }
        return {
          primary: `${STORAGE_KEY}${SCOPED_STATE_KEY_SEPARATOR}${profileId}`,
          backup: `${BACKUP_KEY}${SCOPED_STATE_KEY_SEPARATOR}${profileId}`,
          lastGood: `${LAST_GOOD_KEY}${SCOPED_STATE_KEY_SEPARATOR}${profileId}`
        };
      }

      function parseState() {
        try {
          const scoped = getScopedLocalStateKeys();
          const raw = localStorage.getItem(scoped.primary)
            || localStorage.getItem(scoped.backup)
            || localStorage.getItem(scoped.lastGood)
            || localStorage.getItem(STORAGE_KEY)
            || localStorage.getItem(BACKUP_KEY)
            || localStorage.getItem(LAST_GOOD_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === 'object' ? parsed : {};
        } catch (_) {
          return {};
        }
      }

      function saveState(next) {
        const payload = next && typeof next === 'object' ? next : {};
        payload._meta = { ...(payload._meta || {}), updated_at: new Date().toISOString() };
        const serialized = JSON.stringify(payload);
        const scoped = getScopedLocalStateKeys();
        localStorage.setItem(scoped.primary, serialized);
        localStorage.setItem(scoped.backup, serialized);
        localStorage.setItem(scoped.lastGood, serialized);
      }

      function getInvoiceDue(inv) {
        const total = Number(inv.total) || 0;
        const paid = Number(inv.paidAmount) || 0;
        return Math.max(0, total - paid);
      }

      function setInvoiceStatus(inv) {
        const total = Number(inv.total) || 0;
        const paid = Number(inv.paidAmount) || 0;
        if (paid >= total) inv.status = 'Paid';
        else if (paid > 0) inv.status = 'Partial';
        else inv.status = 'Pending';
      }

      const state = parseState();
      state.customers = state.customers && typeof state.customers === 'object' ? state.customers : {};
      state.invoices = Array.isArray(state.invoices) ? state.invoices : [];
      state.payments = Array.isArray(state.payments) ? state.payments : [];
      state.cashBank = state.cashBank && typeof state.cashBank === 'object' ? state.cashBank : {};
      state.cashBank.accounts = Array.isArray(state.cashBank.accounts) ? state.cashBank.accounts : [];
      state.cashBank.defaultBankAccountId = String(state.cashBank.defaultBankAccountId || '');

      function normalizeMode(value) {
        const mode = String(value || '').trim().toLowerCase();
        if (mode === 'cash') return 'cash';
        if (mode === 'bank' || mode === 'upi' || mode === 'cheque' || mode === 'card') return 'bank';
        return mode || 'cash';
      }

      function renderBankAccounts() {
        if (!bankAccountEl) return;
        const opts = ['<option value="">Auto (first bank account)</option>']
          .concat((state.cashBank.accounts || []).map((acc) => `<option value="${acc.id}">${acc.accountName || 'Bank Account'}</option>`));
        bankAccountEl.innerHTML = opts.join('');
      }

      function getDefaultBankAccountId() {
        if (state.cashBank.defaultBankAccountId && (state.cashBank.accounts || []).some((a) => a.id === state.cashBank.defaultBankAccountId)) {
          return state.cashBank.defaultBankAccountId;
        }
        return state.cashBank.accounts?.[0]?.id || '';
      }

      function syncBankAccountVisibility() {
        if (!bankAccountWrap) return;
        const bankMode = normalizeMode(modeEl.value) === 'bank';
        bankAccountWrap.classList.toggle('is-hidden', !bankMode);
        bankAccountWrap.setAttribute('aria-hidden', bankMode ? 'false' : 'true');
        const mode = String(modeEl.value || '').toLowerCase();
        if (!modeHintEl) return;
        if (mode === 'cash') {
          modeHintEl.textContent = 'Cash selected - no extra fields needed.';
          modeHintEl.className = 'form-hint';
          return;
        }
        if (mode === 'bank') {
          modeHintEl.textContent = 'Bank selected - add transaction reference for easier reconciliation.';
          modeHintEl.className = 'form-hint info';
          return;
        }
        if (mode === 'upi') {
          modeHintEl.textContent = 'UPI selected - add UTR in Transaction Reference.';
          modeHintEl.className = 'form-hint info';
          return;
        }
        modeHintEl.textContent = 'Add instrument/reference details in Transaction Reference for this payment mode.';
        modeHintEl.className = 'form-hint';
      }

      const customers = Object.keys(state.customers)
        .filter((name) => !state.customers[name]?.deleted)
        .sort((a, b) => a.localeCompare(b));

      const openInvoices = state.invoices.filter((inv) => getInvoiceDue(inv) > 0);

      if (!openInvoices.length) {
        saveBtn.disabled = true;
        errorEl.textContent = 'No open invoices found. Create an invoice or record pending dues first.';
      }

      customerEl.innerHTML = ['<option value="">Select customer</option>']
        .concat(customers.map((name) => `<option value="${name}">${name}</option>`))
        .join('');

      function renderInvoiceOptions(customerName) {
        const rows = openInvoices
          .filter((inv) => !customerName || inv.customer === customerName)
          .sort((a, b) => String(a.id || '').localeCompare(String(b.id || '')));
        invoiceEl.innerHTML = ['<option value="">Select invoice</option>']
          .concat(rows.map((inv) => {
            const due = getInvoiceDue(inv);
            return `<option value="${inv.id}">${inv.id} | ${inv.customer} | Due INR ${fmt.format(due)}</option>`;
          }))
          .join('');
      }

      function selectedInvoice() {
        const id = invoiceEl.value;
        return state.invoices.find((inv) => String(inv.id) === String(id));
      }

      function syncPreview() {
        const inv = selectedInvoice();
        if (!inv) {
          invoiceTotalEl.textContent = '₹0';
          invoiceDueEl.textContent = '₹0';
          statusEl.textContent = '-';
          if (previewPaidEl) previewPaidEl.textContent = '₹0';
          if (previewRemainingEl) previewRemainingEl.textContent = '₹0';
          if (previewStatusEl) previewStatusEl.textContent = '-';
          if (amountHintEl) amountHintEl.textContent = '';
          if (smartHintEl) smartHintEl.textContent = '';
          errorEl.textContent = '';
          saveBtn.textContent = 'Save Payment';
          return;
        }
        const total = Number(inv.total) || 0;
        const due = getInvoiceDue(inv);
        invoiceTotalEl.textContent = `₹${fmt.format(total)}`;
        invoiceDueEl.textContent = `₹${fmt.format(due)}`;

        if (!amountEl.value || Number(amountEl.value) <= 0) {
          amountEl.value = due.toFixed(2);
        }

        const amount = Number(amountEl.value) || 0;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const dueDateRaw = String(inv.dueDate || '').trim();
        const dueDate = dueDateRaw ? new Date(`${dueDateRaw}T00:00:00`) : null;
        const isOverdue = !!(dueDate && !Number.isNaN(dueDate.getTime()) && due > 0 && dueDate.getTime() < today.getTime());
        const smartTips = [];
        if (isOverdue) smartTips.push('⚠ This invoice is overdue - consider collecting full payment');

        if (amount > due) {
          const extra = amount - due;
          statusEl.innerHTML = `<span class="status-preview-stack"><span class="status-chip overpaid">Overpaid</span><span class="status-remaining">₹${fmt.format(extra)} extra</span></span>`;
          if (previewPaidEl) previewPaidEl.textContent = `₹${fmt.format(amount)}`;
          if (previewRemainingEl) previewRemainingEl.textContent = '₹0';
          if (previewStatusEl) previewStatusEl.innerHTML = '<span class="status-chip overpaid">Overpaid</span>';
          if (amountHintEl) {
            amountHintEl.innerHTML = `<span class="amount-state-badge overpaid">Overpayment</span> Warning: amount exceeds due by ₹${fmt.format(extra)}.`;
            amountHintEl.className = 'form-hint warn';
          }
          errorEl.textContent = 'Payment amount cannot exceed invoice due.';
          saveBtn.textContent = 'Save Payment';
        } else if (amount <= 0) {
          statusEl.textContent = '-';
          if (previewPaidEl) previewPaidEl.textContent = '₹0';
          if (previewRemainingEl) previewRemainingEl.textContent = `₹${fmt.format(due)}`;
          if (previewStatusEl) previewStatusEl.textContent = '-';
          if (amountHintEl) {
            amountHintEl.textContent = '';
            amountHintEl.className = 'form-hint';
          }
          errorEl.textContent = '';
          saveBtn.textContent = 'Save Payment';
        } else {
          const remaining = Math.max(0, due - amount);
          if (previewPaidEl) previewPaidEl.textContent = `₹${fmt.format(amount)}`;
          if (previewRemainingEl) previewRemainingEl.textContent = `₹${fmt.format(remaining)}`;
          if (remaining === 0) {
            statusEl.innerHTML = '<span class="status-preview-stack"><span class="status-chip paid">Paid</span><span class="status-remaining">₹0 remaining</span></span>';
            if (previewStatusEl) previewStatusEl.innerHTML = '<span class="status-chip paid">Paid</span>';
            if (amountHintEl) {
              amountHintEl.innerHTML = '<span class="amount-state-badge full">Full Payment</span>';
              amountHintEl.className = 'form-hint';
            }
            saveBtn.textContent = 'Mark as Paid';
          } else {
            statusEl.innerHTML = `<span class="status-preview-stack"><span class="status-chip partial">Partial</span><span class="status-remaining">₹${fmt.format(remaining)} remaining</span></span>`;
            if (previewStatusEl) previewStatusEl.innerHTML = '<span class="status-chip partial">Partial</span>';
            if (amountHintEl) {
              amountHintEl.innerHTML = `<span class="amount-state-badge partial">Partial Payment</span> ₹${fmt.format(remaining)} will remain pending.`;
              amountHintEl.className = 'form-hint';
            }
            saveBtn.textContent = 'Record Partial Payment';
            smartTips.push('💡 Remaining amount will stay as pending');
          }
          errorEl.textContent = '';
        }
        if (smartHintEl) {
          smartHintEl.innerHTML = smartTips.map((tip) => {
            if (tip.includes('overdue')) return `<span class="overdue-tip">${tip}</span>`;
            return `<span class="pending-tip">${tip}</span>`;
          }).join('<br />');
        }
      }

      customerEl.addEventListener('change', () => {
        renderInvoiceOptions(customerEl.value);
        syncPreview();
      });

      invoiceEl.addEventListener('change', () => {
        const inv = selectedInvoice();
        if (inv && customerEl.value !== inv.customer) {
          customerEl.value = inv.customer;
        }
        syncPreview();
      });

      amountEl.addEventListener('input', syncPreview);
      modeEl.addEventListener('change', syncBankAccountVisibility);

      renderBankAccounts();
      renderInvoiceOptions('');
      syncPreview();
      syncBankAccountVisibility();

      document.getElementById('payment-in-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const inv = selectedInvoice();
        const amount = Number(amountEl.value) || 0;
        const date = dateEl.value || new Date().toISOString().slice(0, 10);

        if (!inv) {
          errorEl.textContent = 'Select an invoice.';
          return;
        }
        const due = getInvoiceDue(inv);
        if (amount <= 0) {
          errorEl.textContent = 'Amount must be greater than 0.';
          return;
        }
        if (amount > due) {
          errorEl.textContent = 'Payment amount cannot exceed invoice due.';
          return;
        }

        inv.paidAmount = (Number(inv.paidAmount) || 0) + amount;
        setInvoiceStatus(inv);
        state.payments.push({
          id: `PAY-${Date.now()}`,
          invoiceId: inv.id,
          customer: inv.customer,
          amount,
          mode: modeEl.value || 'cash',
          bankAccountId: normalizeMode(modeEl.value) === 'bank' ? (bankAccountEl.value || getDefaultBankAccountId()) : '',
          date,
          notes: String(notesEl.value || '').trim()
        });

        saveState(state);
        goBack();
      });
    })();
  </script>
</body>
</html>
