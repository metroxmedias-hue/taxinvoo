<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="../assets/poppins.css" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Metrox TaxInvoo — Business Setup</title>
  <meta name="description" content="Create your business profile for Metrox TaxInvoo." />
  <script>
    (function () {
      var saved = localStorage.getItem("metrox-theme");
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      var theme = saved || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

    :root {
      --brand-indigo: #6a4df5;
      --brand-blue: #3d8bde;
      --brand-cyan: #69d7d8;
      --bg: #f2f6ff;
      --panel: rgba(255, 255, 255, 0.74);
      --line: rgba(30, 36, 85, 0.13);
      --ink: #161a3d;
      --muted: #5d6387;
      --input-bg: #ffffff;
      --input-border: rgba(30, 36, 85, 0.15);
      --error: #c63949;
      --shadow: 0 22px 55px rgba(36, 44, 109, 0.12);
    }

    [data-theme="dark"] {
      --bg: #10163b;
      --panel: rgba(22, 29, 74, 0.72);
      --line: rgba(214, 222, 255, 0.16);
      --ink: #eef2ff;
      --muted: #b2badf;
      --input-bg: #151c45;
      --input-border: rgba(214, 222, 255, 0.2);
      --error: #ffb4bd;
      --shadow: 0 28px 64px rgba(7, 10, 28, 0.46);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(700px 420px at 82% 0%, rgba(106, 77, 245, 0.12), transparent 64%),
        radial-gradient(640px 420px at 8% 0%, rgba(105, 215, 216, 0.1), transparent 60%),
        var(--bg);
      min-height: 100vh;
      padding: 40px 24px;
      transition: background-color 0.35s ease, color 0.35s ease;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(color-mix(in srgb, var(--line) 78%, transparent) 1px, transparent 1px), linear-gradient(90deg, color-mix(in srgb, var(--line) 78%, transparent) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, #000 20%, transparent 82%);
      opacity: 0.55;
      z-index: -1;
    }

    .shell {
      max-width: 740px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
      backdrop-filter: blur(10px);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .card:hover {
      transform: none;
      border-color: color-mix(in srgb, var(--brand-cyan) 34%, var(--line));
      box-shadow: 0 24px 50px rgba(27, 42, 112, 0.24);
    }

    h1 {
      margin: 0;
      font-family: "Sora", sans-serif;
      font-size: 32px;
      line-height: 1.04;
      letter-spacing: -0.02em;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .form { display: grid; gap: 14px; }
    .field {
      display: grid;
      gap: 7px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .field input,
    .field select {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--ink);
      font-family: inherit;
      font-size: 15px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.18s ease;
    }

    .field input::placeholder {
      color: color-mix(in srgb, var(--muted) 88%, transparent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: color-mix(in srgb, var(--brand-cyan) 55%, var(--input-border));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--brand-cyan) 16%, transparent);
      transform: translateY(-1px);
    }

    .field input[type="file"] {
      padding: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
    }

    .field input[type="file"]::file-selector-button {
      border: 1px solid var(--input-border);
      border-radius: 10px;
      padding: 7px 11px;
      margin-right: 10px;
      font-family: inherit;
      font-weight: 600;
      color: var(--ink);
      background: color-mix(in srgb, var(--panel) 72%, transparent);
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .field input[type="file"]::file-selector-button:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--brand-blue) 42%, var(--input-border));
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
      align-items: start;
    }

    .split > .field {
      min-width: 0;
    }

    .btn {
      padding: 13px 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--brand-cyan) 36%, var(--line));
    }

    .btn.primary {
      background: linear-gradient(120deg, var(--brand-cyan), var(--brand-blue), var(--brand-indigo));
      color: #f8faff;
      border-color: transparent;
      box-shadow: 0 16px 34px rgba(61, 139, 222, 0.34);
    }

    .error {
      color: var(--error);
      font-size: 12px;
      font-weight: 600;
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .btn,
      .field input,
      .field select,
      .field input[type="file"]::file-selector-button {
        animation: none !important;
        transition: none !important;
        transform: none !important;
      }
    }

    @media (max-width: 640px) {
      .split { grid-template-columns: 1fr; }
      body { padding: 16px; }
      .card { padding: 14px; border-radius: 14px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <h1>Business Setup</h1>
      <div class="muted">Create your business profile to continue.</div>
    </div>

    <div class="card">
      <form class="form" id="business-form">
        <label class="field">Business Name *
          <input type="text" id="biz-name" required placeholder="Orion Auto Solutions" />
        </label>
        <div class="split">
          <label class="field">GSTIN (optional)
            <input type="text" id="biz-gstin" placeholder="27AAAAA0000A1Z5" />
          </label>
          <label class="field">Business type *
            <select id="biz-type" required>
              <option value="services">Services</option>
              <option value="goods">Goods</option>
            </select>
          </label>
        </div>
        <div class="split">
          <label class="field">State *
            <select id="biz-state" required>
              <option value="">Select state</option>
              <option value="Jammu & Kashmir">Jammu & Kashmir</option>
              <option value="Himachal Pradesh">Himachal Pradesh</option>
              <option value="Punjab">Punjab</option>
              <option value="Chandigarh">Chandigarh</option>
              <option value="Uttarakhand">Uttarakhand</option>
              <option value="Haryana">Haryana</option>
              <option value="Delhi">Delhi</option>
              <option value="Rajasthan">Rajasthan</option>
              <option value="Uttar Pradesh">Uttar Pradesh</option>
              <option value="Bihar">Bihar</option>
              <option value="Sikkim">Sikkim</option>
              <option value="Arunachal Pradesh">Arunachal Pradesh</option>
              <option value="Nagaland">Nagaland</option>
              <option value="Manipur">Manipur</option>
              <option value="Mizoram">Mizoram</option>
              <option value="Tripura">Tripura</option>
              <option value="Meghalaya">Meghalaya</option>
              <option value="Assam">Assam</option>
              <option value="West Bengal">West Bengal</option>
              <option value="Jharkhand">Jharkhand</option>
              <option value="Odisha">Odisha</option>
              <option value="Chattisgarh">Chattisgarh</option>
              <option value="Madhya Pradesh">Madhya Pradesh</option>
              <option value="Gujarat">Gujarat</option>
              <option value="Daman & Diu">Daman & Diu</option>
              <option value="Dadra & Nagar Haveli">Dadra & Nagar Haveli</option>
              <option value="Maharashtra">Maharashtra</option>
              <option value="Andhra Pradesh (Before Division)">Andhra Pradesh (Before Division)</option>
              <option value="Karnataka">Karnataka</option>
              <option value="Goa">Goa</option>
              <option value="Lakshadweep">Lakshadweep</option>
              <option value="Kerala">Kerala</option>
              <option value="Tamil Nadu">Tamil Nadu</option>
              <option value="Puducherry">Puducherry</option>
              <option value="Andaman & Nicobar Islands">Andaman & Nicobar Islands</option>
              <option value="Telangana">Telangana</option>
              <option value="Andhra Pradesh (Newly Added)">Andhra Pradesh (Newly Added)</option>
              <option value="Ladakh">Ladakh</option>
            </select>
          </label>
          <label class="field">Business logo (optional)
            <input type="file" id="biz-logo" accept="image/*" />
          </label>
        </div>
        <div class="split">
          <label class="field">Business phone (optional)
            <input type="tel" id="biz-phone" placeholder="+91 90000 00000" />
          </label>
          <label class="field">Financial Year Start (optional)
            <input type="date" id="biz-fy-start" />
          </label>
        </div>
        <label class="field">Business address
          <input type="text" id="biz-address" placeholder="Registered business address" />
        </label>
        <button class="btn primary" type="submit">Create Business</button>
        <div class="error" id="form-error" style="display:none;"></div>
      </form>
    </div>
  </div>

  <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
    import { app, db } from "../js/firebase.js";
    import { businessDocPath, userDocPath } from "../js/firestore-paths.js";
    import {
      ensureTrialSubscription,
      ensureUserRecord,
      linkUserToBusiness,
      markBusinessSetupCompleted
    } from "../js/subscription.js";

    const auth = getAuth(app);

    const form = document.getElementById('business-form');
    const errorEl = document.getElementById('form-error');
    let logoDataUrl = '';
    const MAX_LOGO_FILE_BYTES = 350 * 1024;
    const MAX_LOGO_DATAURL_LENGTH = 120000;
    const MAX_TEXT = {
      name: 120,
      gstin: 32,
      type: 40,
      state: 80,
      phone: 24,
      address: 260,
      fy: 20
    };

    function setError(msg) {
      if (!errorEl) return;
      errorEl.textContent = msg || '';
      errorEl.style.display = msg ? 'block' : 'none';
    }

    function mockCodexCreateBusiness(payload) {
      const businessId = `biz_${Date.now()}`;
      return Promise.resolve({ status: 'success', business_id: businessId });
    }

    const logoInput = document.getElementById('biz-logo');
    if (logoInput) {
      logoInput.addEventListener('change', () => {
        const file = logoInput.files?.[0];
        if (!file) {
          logoDataUrl = '';
          return;
        }
        if (file.size > MAX_LOGO_FILE_BYTES) {
          logoDataUrl = '';
          logoInput.value = '';
          setError('Logo is too large. Please upload an image under 350KB.');
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          logoDataUrl = typeof reader.result === 'string' ? reader.result : '';
          if (logoDataUrl && logoDataUrl.length > MAX_LOGO_DATAURL_LENGTH) {
            logoDataUrl = '';
            setError('Logo is too detailed for cloud save. Continue without logo, then upload in Settings.');
          }
        };
        reader.readAsDataURL(file);
      });
    }

    function formatFirestoreError(err) {
      const code = String(err?.code || '').trim();
      if (code === 'permission-denied') {
        return 'Permission denied by Firestore rules. Please allow create/write for your logged-in user.';
      }
      if (code === 'unauthenticated') {
        return 'Session expired. Please login again and retry.';
      }
      if (code === 'resource-exhausted' || code === 'invalid-argument') {
        return 'Business payload is too large for Firestore. Retry without logo and upload it later in Settings.';
      }
      const message = String(err?.message || '').trim();
      return message ? `Failed to save business: ${message}` : 'Failed to save business. Please retry.';
    }

    function safeText(value, maxLen) {
      return String(value || '').trim().slice(0, maxLen);
    }

    function safeDateInput(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
      const parsed = new Date(raw);
      if (Number.isNaN(parsed.getTime())) return '';
      return parsed.toISOString().slice(0, 10);
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      if (!user.emailVerified) {
        window.location.href = 'verify-email.html';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setError('');

      const businessName = safeText(document.getElementById('biz-name').value, MAX_TEXT.name);
      const gstin = safeText(document.getElementById('biz-gstin').value, MAX_TEXT.gstin);
      const bizType = safeText(document.getElementById('biz-type').value, MAX_TEXT.type);
      const state = safeText(document.getElementById('biz-state').value, MAX_TEXT.state);
      const phone = safeText(document.getElementById('biz-phone').value, MAX_TEXT.phone);
      const address = safeText(document.getElementById('biz-address').value, MAX_TEXT.address);
      const fyStart = safeDateInput(document.getElementById('biz-fy-start').value || '').slice(0, MAX_TEXT.fy);

      if (!businessName || !state) {
        setError('Please fill all required fields.');
        return;
      }

      const user = auth.currentUser;
      if (!user) {
        setError('You must be logged in.');
        return;
      }

      const intentPayload = {
        intent: 'create_business',
        user_id: user.uid,
        business_name: businessName,
        gstin: gstin,
        business_type: bizType,
        state: state,
        business_phone: phone,
        business_address: address,
        financial_year_start: fyStart
      };

      let codexResponse;
      try {
        codexResponse = await mockCodexCreateBusiness(intentPayload);
      } catch (err) {
        setError('Failed to create business. Please try again.');
        return;
      }

      if (!codexResponse || codexResponse.status !== 'success') {
        setError('Business creation failed.');
        return;
      }

      try {
        const now = new Date();
        const trialEnd = new Date();
        trialEnd.setDate(now.getDate() + 3);
        const businessPayload = {
          business_id: "",
          name: businessName,
          gstin: gstin || '',
          type: bizType || 'services',
          state,
          phone: phone || '',
          address: address || '',
          invoice_count: 0,
          setup_completed: true,
          trial_starts_at: now.toISOString(),
          plan_type: 'trial',
          plan_status: 'active',
          is_active: true,
          current_plan: 'trial',
          subscription_status: 'active',
          trial_ends_at: trialEnd.toISOString(),
          financial_year_start: fyStart || '',
          created_at: serverTimestamp(),
          updated_at: serverTimestamp()
        };
        const requestedBusinessId = String(codexResponse.business_id || '').trim();
        const candidateIds = Array.from(new Set([
          requestedBusinessId,
          `biz_${user.uid}`,
          user.uid
        ].filter(Boolean)));
        let businessId = '';
        let createErr = null;
        for (const candidateId of candidateIds) {
          try {
            const businessRef = doc(db, ...businessDocPath(user.uid, candidateId));
            const businessSnap = await getDoc(businessRef);
            if (businessSnap.exists()) continue;
            await setDoc(businessRef, { ...businessPayload, business_id: candidateId }, { merge: true });
            businessId = candidateId;
            break;
          } catch (err) {
            createErr = err;
          }
        }
        if (!businessId) throw createErr || new Error('Unable to create business document.');

        await ensureUserRecord(user, { role: 'owner' });
        await ensureTrialSubscription(user.uid);
        await linkUserToBusiness(user.uid, businessId, user.uid);
        await markBusinessSetupCompleted(user.uid, businessId);
        await setDoc(doc(db, ...userDocPath(user.uid)), {
          user_id: user.uid,
          email: user.email || '',
          business_id: businessId,
          business_owner_uid: user.uid,
          updated_at: serverTimestamp()
        }, { merge: true });

        const onboardingSeed = {
          business_id: businessId,
          company: {
            name: businessName,
            gstin: gstin || '',
            type: bizType || 'services',
            state: state,
            phone: phone || '',
            address: address || '',
            logo: logoDataUrl || '',
            financial_year_start: fyStart || ''
          }
        };
        localStorage.removeItem('metrox_taxdesk_demo_state');
        localStorage.removeItem('metrox_taxdesk_demo_state_backup');
        localStorage.removeItem('metrox_taxinvoo_demo_state');
        localStorage.removeItem('metrox_taxinvoo_demo_state_backup');
        localStorage.setItem('metrox_onboarding_seed', JSON.stringify(onboardingSeed));
        localStorage.removeItem('metrox_fresh_start');

        console.log('BUSINESS CREATED:', businessId);
        window.location.href = '../app/index.html';
      } catch (err) {
        console.error('Business setup save failed:', err);
        setError(formatFirestoreError(err));
      }
    });
  </script>
</body>
</html>
