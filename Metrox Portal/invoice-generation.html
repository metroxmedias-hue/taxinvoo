<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Metrox TaxInvoo — Invoice Generation</title>
  <meta name="description" content="Dedicated entry page for invoice generation." />
  <style>
    :root {
      --bg: #0b0e18;
      --panel: #11162a;
      --line: rgba(255,255,255,0.12);
      --ink: #f2efe6;
      --muted: rgba(242,239,230,0.7);
      --accent: #f7b23b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Space Grotesk", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(900px 520px at 20% -10%, rgba(247,178,59,0.16), transparent),
                  radial-gradient(880px 500px at 110% 5%, rgba(88,214,193,0.16), transparent),
                  linear-gradient(180deg, #0a0d16, #0b0e18);
      padding: 20px;
    }
    .card {
      width: min(520px, 100%);
      background: rgba(11,16,30,0.82);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      display: grid;
      gap: 10px;
      text-align: center;
    }
    h1 { margin: 0; font-size: 24px; }
    p { margin: 0; color: var(--muted); font-size: 14px; }
    button {
      margin-top: 8px;
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      background: var(--accent);
      color: #1b1305;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Invoice Generation</h1>
    <p>Opening your invoice form...</p>
    <button type="button" id="open-now">Open now</button>
  </div>
  <script>
    (function () {
      const focusKey = 'metrox_open_invoice_form';
      const target = 'index.html#/invoices';
      try { localStorage.setItem(focusKey, '1'); } catch (_) {}
      const go = function () { window.location.replace(target); };
      document.getElementById('open-now')?.addEventListener('click', go);
      window.setTimeout(go, 180);
    })();
  </script>
</body>
</html>
