<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Metrox TaxInvoo - Create Proforma Invoice</title>
  <meta name="description" content="Dedicated Proforma Invoice creation form." />
  <style>
    :root {
      --bg: #0b0e18;
      --panel: #11162a;
      --line: rgba(255,255,255,0.12);
      --ink: #f2efe6;
      --muted: rgba(242,239,230,0.72);
      --accent: #5b52f3;
      --danger: #ff8f8f;
      --input: rgba(255,255,255,0.03);
    }
    body.light {
      --bg: #f4f7ff;
      --panel: #ffffff;
      --line: rgba(15,23,42,0.15);
      --ink: #0f172a;
      --muted: rgba(15,23,42,0.66);
      --accent: #4f46e5;
      --danger: #dc2626;
      --input: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: "Space Grotesk", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(920px 520px at 18% -10%, rgba(91,82,243,0.16), transparent),
        radial-gradient(900px 520px at 112% 3%, rgba(88,214,193,0.12), transparent),
        linear-gradient(180deg, #0a0d16, var(--bg));
      display: grid;
      place-items: center;
    }
    .shell {
      width: min(980px, 100%);
      background: color-mix(in oklab, var(--panel) 90%, transparent);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      display: grid;
      gap: 16px;
      backdrop-filter: blur(6px);
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 26px; letter-spacing: -0.01em; }
    .muted { color: var(--muted); font-size: 13px; }
    form { display: grid; gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    label { display: grid; gap: 7px; font-size: 13px; color: var(--muted); }
    input, select, textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px;
      background: var(--input); color: var(--ink); font: inherit; outline: none;
    }
    textarea { min-height: 86px; resize: vertical; }
    .table-shell {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px; border-bottom: 1px solid var(--line); text-align: left; }
    th { color: var(--muted); font-weight: 600; }
    td input { min-width: 100px; }
    .summary {
      display: grid; gap: 8px; border: 1px solid var(--line); border-radius: 12px;
      padding: 12px; background: rgba(255,255,255,0.02);
    }
    .row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); }
    .row strong { color: var(--ink); }
    .error { color: var(--danger); font-size: 12px; min-height: 16px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px;
      background: rgba(255,255,255,0.03); color: var(--ink);
      font: inherit; font-weight: 600; cursor: pointer;
    }
    button.primary { border-color: transparent; background: linear-gradient(135deg, #5b52f3, #4b43d1); color: #fff; }
    @media (max-width: 760px) {
      body { padding: 12px; }
      .shell { padding: 14px; }
      .grid-2 { grid-template-columns: 1fr; }
      table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="head">
      <div>
        <h1>Create Proforma Invoice</h1>
        <div class="muted">Draft a proforma invoice and export in your selected template design.</div>
      </div>
      <button type="button" id="back-btn">Back to Proforma Invoice</button>
    </div>

    <form id="proforma-form">
      <div class="grid-2">
        <label>Customer
          <select id="customer" required>
            <option value="">Select customer</option>
          </select>
        </label>
        <label>Invoice type
          <select id="invoice-type">
            <option value="gst">GST Proforma</option>
            <option value="non-gst">Non-GST Proforma</option>
          </select>
        </label>
      </div>

      <div class="grid-2">
        <label>Date
          <input type="date" id="date" required />
        </label>
        <label>Valid for (days)
          <input type="number" id="valid-days" min="1" step="1" value="30" required />
        </label>
      </div>

      <div class="grid-2">
        <label>Supply type
          <select id="supply">
            <option value="intra">Intra-state</option>
            <option value="inter">Inter-state</option>
          </select>
        </label>
        <label>GST rate (%)
          <input type="number" id="gst-rate" min="0" step="0.01" value="18" />
        </label>
      </div>

      <div class="table-shell">
        <table>
          <thead>
            <tr>
              <th>Description</th>
              <th>HSN/SAC</th>
              <th>Qty</th>
              <th>Rate</th>
              <th>Amount</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="item-rows"></tbody>
        </table>
      </div>
      <button type="button" id="add-item">Add Item</button>

      <label>Notes
        <textarea id="notes" placeholder="Terms, validity, scope, exclusions, etc."></textarea>
      </label>

      <div class="summary">
        <div class="row"><span>Taxable</span><strong id="taxable-amount">INR 0</strong></div>
        <div class="row"><span>CGST</span><strong id="cgst-amount">INR 0</strong></div>
        <div class="row"><span>SGST</span><strong id="sgst-amount">INR 0</strong></div>
        <div class="row"><span>IGST</span><strong id="igst-amount">INR 0</strong></div>
        <div class="row"><span>Total</span><strong id="total-amount">INR 0</strong></div>
      </div>

      <div class="error" id="error"></div>
      <div class="actions">
        <button type="submit" class="primary">Save Proforma Invoice</button>
        <button type="button" id="cancel-btn">Cancel</button>
      </div>
    </form>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = 'metrox_taxinvoo_demo_state';
      const BACKUP_KEY = 'metrox_taxinvoo_demo_state_backup';
      const LAST_GOOD_KEY = 'metrox_taxinvoo_last_good_state';
      const FOCUS_KEY = 'metrox_open_proforma_form';
      const EDIT_KEY = 'metrox_edit_proforma_id';
      const target = 'index.html#/sales-transactions';
      const fmt = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 2 });

      const theme = localStorage.getItem('Metrox TaxInvoo_theme');
      if (theme === 'light') document.body.classList.add('light');

      const customerEl = document.getElementById('customer');
      const invoiceTypeEl = document.getElementById('invoice-type');
      const dateEl = document.getElementById('date');
      const validDaysEl = document.getElementById('valid-days');
      const supplyEl = document.getElementById('supply');
      const gstRateEl = document.getElementById('gst-rate');
      const notesEl = document.getElementById('notes');
      const itemRowsEl = document.getElementById('item-rows');
      const taxableAmountEl = document.getElementById('taxable-amount');
      const cgstAmountEl = document.getElementById('cgst-amount');
      const sgstAmountEl = document.getElementById('sgst-amount');
      const igstAmountEl = document.getElementById('igst-amount');
      const totalAmountEl = document.getElementById('total-amount');
      const errorEl = document.getElementById('error');
      const submitBtn = document.querySelector('#proforma-form button[type="submit"]');

      dateEl.value = new Date().toISOString().slice(0, 10);

      function goBack() {
        try { localStorage.setItem(FOCUS_KEY, '1'); } catch (_) {}
        window.location.href = target;
      }

      document.getElementById('back-btn').addEventListener('click', goBack);
      document.getElementById('cancel-btn').addEventListener('click', goBack);

      function parseState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === 'object' ? parsed : {};
        } catch (_) {
          return {};
        }
      }

      function saveState(next) {
        const payload = next && typeof next === 'object' ? next : {};
        payload._meta = { ...(payload._meta || {}), updated_at: new Date().toISOString() };
        const serialized = JSON.stringify(payload);
        localStorage.setItem(STORAGE_KEY, serialized);
        localStorage.setItem(BACKUP_KEY, serialized);
        localStorage.setItem(LAST_GOOD_KEY, serialized);
      }

      const state = parseState();
      state.customers = state.customers && typeof state.customers === 'object' ? state.customers : {};
      state.proformaInvoices = Array.isArray(state.proformaInvoices) ? state.proformaInvoices : [];
      const editingId = localStorage.getItem(EDIT_KEY) || '';
      if (editingId) localStorage.removeItem(EDIT_KEY);

      const customerNames = Object.keys(state.customers)
        .filter((name) => !state.customers[name]?.deleted)
        .sort((a, b) => a.localeCompare(b));
      customerEl.innerHTML = ['<option value="">Select customer</option>']
        .concat(customerNames.map((name) => `<option value="${name}">${name}</option>`))
        .join('');

      function itemRow(data = {}) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><input name="description" placeholder="Item / service" value="${data.description || ''}" /></td>
          <td><input name="hsn" placeholder="HSN/SAC" value="${data.hsn || ''}" /></td>
          <td><input name="qty" type="number" min="1" step="1" value="${data.qty || 1}" /></td>
          <td><input name="rate" type="number" min="0" step="0.01" value="${data.rate || 0}" /></td>
          <td><input name="amount" type="number" min="0" step="0.01" value="0" readonly /></td>
          <td><button type="button" class="remove">Remove</button></td>
        `;
        const qty = tr.querySelector('input[name="qty"]');
        const rate = tr.querySelector('input[name="rate"]');
        const amount = tr.querySelector('input[name="amount"]');

        function update() {
          const total = (Number(qty.value) || 0) * (Number(rate.value) || 0);
          amount.value = String(total.toFixed(2));
          updateTotals();
        }

        qty.addEventListener('input', update);
        rate.addEventListener('input', update);
        tr.querySelector('.remove').addEventListener('click', () => {
          tr.remove();
          if (!itemRowsEl.querySelector('tr')) itemRowsEl.appendChild(itemRow());
          updateTotals();
        });

        update();
        return tr;
      }

      function updateTotals() {
        const taxable = Array.from(itemRowsEl.querySelectorAll('tr')).reduce((sum, tr) => {
          const val = Number(tr.querySelector('input[name="amount"]')?.value || 0);
          return sum + (Number.isFinite(val) ? val : 0);
        }, 0);
        const isNonGst = invoiceTypeEl.value === 'non-gst';
        const rate = isNonGst ? 0 : (Number(gstRateEl.value) || 0);
        let cgst = 0;
        let sgst = 0;
        let igst = 0;
        if (rate > 0) {
          const tax = taxable * (rate / 100);
          if (supplyEl.value === 'inter') {
            igst = tax;
          } else {
            cgst = tax / 2;
            sgst = tax / 2;
          }
        }
        const total = taxable + cgst + sgst + igst;
        taxableAmountEl.textContent = `INR ${fmt.format(taxable)}`;
        cgstAmountEl.textContent = `INR ${fmt.format(cgst)}`;
        sgstAmountEl.textContent = `INR ${fmt.format(sgst)}`;
        igstAmountEl.textContent = `INR ${fmt.format(igst)}`;
        totalAmountEl.textContent = `INR ${fmt.format(total)}`;
        return { taxable, cgst, sgst, igst, total };
      }

      function collectItems() {
        return Array.from(itemRowsEl.querySelectorAll('tr')).map((tr) => {
          const description = String(tr.querySelector('input[name="description"]')?.value || '').trim();
          const hsn = String(tr.querySelector('input[name="hsn"]')?.value || '').trim();
          const qty = Number(tr.querySelector('input[name="qty"]')?.value || 0);
          const rate = Number(tr.querySelector('input[name="rate"]')?.value || 0);
          const total = Number(tr.querySelector('input[name="amount"]')?.value || 0);
          return { description, hsn, sac: '', qty, price: rate, total };
        }).filter((item) => item.description && item.qty > 0);
      }

      document.getElementById('add-item').addEventListener('click', () => itemRowsEl.appendChild(itemRow()));
      invoiceTypeEl.addEventListener('change', updateTotals);
      supplyEl.addEventListener('change', updateTotals);
      gstRateEl.addEventListener('input', updateTotals);

      itemRowsEl.appendChild(itemRow());

      if (editingId) {
        const existing = state.proformaInvoices.find((entry) => entry.id === editingId);
        if (existing) {
          document.title = 'Metrox TaxInvoo - Edit Proforma Invoice';
          const titleEl = document.querySelector('h1');
          if (titleEl) titleEl.textContent = 'Edit Proforma Invoice';
          if (submitBtn) submitBtn.textContent = 'Update Proforma Invoice';
          if (existing.customer) customerEl.value = existing.customer;
          if (existing.date) dateEl.value = existing.date;
          if (existing.validDays) validDaysEl.value = existing.validDays;
          invoiceTypeEl.value = existing.type || 'gst';
          supplyEl.value = existing.supply || 'intra';
          gstRateEl.value = String(Number(existing.rate) || 0);
          notesEl.value = existing.notes || '';
          const existingItems = Array.isArray(existing.items) ? existing.items : [];
          if (existingItems.length) {
            itemRowsEl.innerHTML = '';
            existingItems.forEach((item) => {
              itemRowsEl.appendChild(itemRow({
                description: item.description || '',
                hsn: item.hsn || item.sac || '',
                qty: Number(item.qty) || 1,
                rate: Number(item.price) || 0
              }));
            });
          }
          updateTotals();
        }
      }

      document.getElementById('proforma-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const customer = customerEl.value;
        const items = collectItems();
        const totals = updateTotals();
        if (!customer) {
          errorEl.textContent = 'Select customer.';
          return;
        }
        if (!items.length) {
          errorEl.textContent = 'Add at least one valid item.';
          return;
        }
        const type = invoiceTypeEl.value || 'gst';
        const supply = supplyEl.value || 'intra';
        const rate = type === 'non-gst' ? 0 : (Number(gstRateEl.value) || 0);
        const validDays = Math.max(1, Number(validDaysEl.value) || 30);
        const date = dateEl.value || new Date().toISOString().slice(0, 10);
        const validUntilDate = new Date(`${date}T00:00:00`);
        validUntilDate.setDate(validUntilDate.getDate() + validDays);
        const existingEntry = editingId ? state.proformaInvoices.find((entry) => entry.id === editingId) : null;

        const profile = state.customers[customer] || {};
        const payload = {
          id: editingId || `PF-${Date.now()}`,
          date,
          createdAt: editingId
            ? (state.proformaInvoices.find((entry) => entry.id === editingId)?.createdAt || new Date().toISOString())
            : new Date().toISOString(),
          validDays,
          validUntil: validUntilDate.toISOString().slice(0, 10),
          customer,
          type,
          supply,
          rate,
          taxable: totals.taxable,
          cgst: totals.cgst,
          sgst: totals.sgst,
          igst: totals.igst,
          total: totals.total,
          amount: totals.total,
          roundOff: 0,
          status: existingEntry?.status || 'open',
          notes: String(notesEl.value || '').trim(),
          items,
          customerDetails: {
            gstin: profile.gstin || '',
            phone: profile.phone || '',
            email: profile.email || '',
            address: profile.address || '',
            state: profile.state || '',
            stateCode: profile.stateCode || ''
          }
        };

        if (editingId) {
          const idx = state.proformaInvoices.findIndex((entry) => entry.id === editingId);
          if (idx >= 0) state.proformaInvoices[idx] = payload;
          else state.proformaInvoices.push(payload);
        } else {
          state.proformaInvoices.push(payload);
        }

        saveState(state);
        goBack();
      });
    })();
  </script>
</body>
</html>
