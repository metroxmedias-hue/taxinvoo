<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Metrox TaxInvoo - Create Purchase Invoice</title>
  <meta name="description" content="Dedicated Purchase Invoice creation form." />
  <style>
    :root {
      --bg: #0b0e18;
      --panel: #11162a;
      --line: rgba(255,255,255,0.12);
      --ink: #f2efe6;
      --muted: rgba(242,239,230,0.72);
      --accent: #5b52f3;
      --danger: #ff8f8f;
      --input: rgba(255,255,255,0.03);
    }
    body.light {
      --bg: #f4f7ff;
      --panel: #ffffff;
      --line: rgba(15,23,42,0.15);
      --ink: #0f172a;
      --muted: rgba(15,23,42,0.66);
      --accent: #4f46e5;
      --danger: #dc2626;
      --input: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: "Space Grotesk", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(920px 520px at 18% -10%, rgba(91,82,243,0.16), transparent),
        radial-gradient(900px 520px at 112% 3%, rgba(88,214,193,0.12), transparent),
        linear-gradient(180deg, #0a0d16, var(--bg));
      display: grid;
      place-items: center;
    }
    .shell {
      width: min(900px, 100%);
      background: color-mix(in oklab, var(--panel) 90%, transparent);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      display: grid;
      gap: 16px;
      backdrop-filter: blur(6px);
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 26px; letter-spacing: -0.01em; }
    .muted { color: var(--muted); font-size: 13px; }
    form { display: grid; gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    label { display: grid; gap: 7px; font-size: 13px; color: var(--muted); }
    input, select, textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px;
      background: var(--input); color: var(--ink); font: inherit; outline: none;
    }
    textarea { min-height: 82px; resize: vertical; }
    .summary {
      display: grid; gap: 8px; border: 1px solid var(--line); border-radius: 12px;
      padding: 12px; background: rgba(255,255,255,0.02);
    }
    .row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); }
    .row strong { color: var(--ink); }
    .error { color: var(--danger); font-size: 12px; min-height: 16px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px;
      background: rgba(255,255,255,0.03); color: var(--ink);
      font: inherit; font-weight: 600; cursor: pointer;
    }
    button.primary { border-color: transparent; background: linear-gradient(135deg, #5b52f3, #4b43d1); color: #fff; }
    @media (max-width: 760px) {
      body { padding: 12px; }
      .shell { padding: 14px; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="head">
      <div>
        <h1 id="form-title">Create Purchase Invoice</h1>
        <div class="muted">Fill details on this page and save back to Purchase Invoices list.</div>
      </div>
      <button type="button" id="back-btn">Back to Purchase Invoices</button>
    </div>

    <form id="purchase-form">
      <div class="grid-2">
        <label>Supplier
          <input type="text" id="supplier" list="supplier-list" placeholder="Ram Traders" required />
          <datalist id="supplier-list"></datalist>
        </label>
        <label>Purchase type
          <select id="purchase-type">
            <option value="goods">Goods</option>
            <option value="services">Services</option>
          </select>
        </label>
      </div>

      <div class="grid-2">
        <label>Item / Service
          <input type="text" id="item" placeholder="Inventory items" />
        </label>
        <label>Amount (INR)
          <input type="number" id="amount" min="0" step="0.01" placeholder="12000" required />
        </label>
      </div>

      <div class="grid-2">
        <label>Place of supply
          <select id="supply">
            <option value="intra">Intra-state (CGST/SGST)</option>
            <option value="inter">Inter-state (IGST)</option>
          </select>
        </label>
        <label>GST rate (%)
          <select id="gst-rate">
            <option value="0">0%</option>
            <option value="5">5%</option>
            <option value="12">12%</option>
            <option value="18" selected>18%</option>
            <option value="28">28%</option>
          </select>
        </label>
      </div>

      <div class="grid-2">
        <label>Purchase invoice number
          <input type="text" id="bill-no" placeholder="PINV-001" />
        </label>
        <label>Invoice date
          <input type="date" id="date" required />
        </label>
      </div>

      <div class="grid-2">
        <label>Due in (days)
          <input type="number" id="due-days" min="0" step="1" value="30" />
        </label>
        <label>Notes
          <input type="text" id="notes" placeholder="Reference / notes" />
        </label>
      </div>

      <div class="summary">
        <div class="row"><span>Input CGST</span><strong id="cgst">INR 0</strong></div>
        <div class="row"><span>Input SGST</span><strong id="sgst">INR 0</strong></div>
        <div class="row"><span>Input IGST</span><strong id="igst">INR 0</strong></div>
        <div class="row"><span>Total tax</span><strong id="tax">INR 0</strong></div>
        <div class="row"><span>Total amount</span><strong id="total">INR 0</strong></div>
      </div>

      <div class="error" id="error"></div>
      <div class="actions">
        <button type="submit" class="primary" id="save-btn">Save Purchase Invoice</button>
        <button type="button" id="cancel-btn">Cancel</button>
      </div>
    </form>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = 'metrox_taxinvoo_demo_state';
      const BACKUP_KEY = 'metrox_taxinvoo_demo_state_backup';
      const LAST_GOOD_KEY = 'metrox_taxinvoo_last_good_state';
      const FOCUS_KEY = 'metrox_open_purchase_invoice_form';
      const EDIT_KEY = 'metrox_edit_purchase_invoice_id';
      const target = 'index.html#/purchases';
      const fmt = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 2 });

      const theme = localStorage.getItem('Metrox TaxInvoo_theme');
      if (theme === 'light') document.body.classList.add('light');

      const form = document.getElementById('purchase-form');
      const formTitle = document.getElementById('form-title');
      const supplierEl = document.getElementById('supplier');
      const supplierListEl = document.getElementById('supplier-list');
      const purchaseTypeEl = document.getElementById('purchase-type');
      const itemEl = document.getElementById('item');
      const amountEl = document.getElementById('amount');
      const supplyEl = document.getElementById('supply');
      const gstRateEl = document.getElementById('gst-rate');
      const billNoEl = document.getElementById('bill-no');
      const dateEl = document.getElementById('date');
      const dueDaysEl = document.getElementById('due-days');
      const notesEl = document.getElementById('notes');
      const cgstEl = document.getElementById('cgst');
      const sgstEl = document.getElementById('sgst');
      const igstEl = document.getElementById('igst');
      const taxEl = document.getElementById('tax');
      const totalEl = document.getElementById('total');
      const errorEl = document.getElementById('error');
      const saveBtn = document.getElementById('save-btn');

      dateEl.value = new Date().toISOString().slice(0, 10);

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>'"]/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch] || ch));
      }

      function goBack() {
        try { localStorage.setItem(FOCUS_KEY, '1'); } catch (_) {}
        window.location.href = target;
      }

      document.getElementById('back-btn').addEventListener('click', goBack);
      document.getElementById('cancel-btn').addEventListener('click', goBack);

      function parseState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === 'object' ? parsed : {};
        } catch (_) {
          return {};
        }
      }

      function saveState(next) {
        const payload = next && typeof next === 'object' ? next : {};
        payload._meta = { ...(payload._meta || {}), updated_at: new Date().toISOString() };
        const serialized = JSON.stringify(payload);
        localStorage.setItem(STORAGE_KEY, serialized);
        localStorage.setItem(BACKUP_KEY, serialized);
        localStorage.setItem(LAST_GOOD_KEY, serialized);
      }

      function addDays(dateStr, days) {
        const date = dateStr ? new Date(dateStr) : new Date();
        if (Number.isNaN(date.getTime())) return '';
        date.setDate(date.getDate() + (Number(days) || 0));
        return date.toISOString().slice(0, 10);
      }

      function calculate() {
        const amount = Number(amountEl.value) || 0;
        const rate = Number(gstRateEl.value) || 0;
        const supply = supplyEl.value || 'intra';
        const tax = amount * (rate / 100);
        const inputCgst = supply === 'inter' ? 0 : tax / 2;
        const inputSgst = supply === 'inter' ? 0 : tax / 2;
        const inputIgst = supply === 'inter' ? tax : 0;
        const total = amount + tax;
        cgstEl.textContent = `INR ${fmt.format(inputCgst)}`;
        sgstEl.textContent = `INR ${fmt.format(inputSgst)}`;
        igstEl.textContent = `INR ${fmt.format(inputIgst)}`;
        taxEl.textContent = `INR ${fmt.format(tax)}`;
        totalEl.textContent = `INR ${fmt.format(total)}`;
        return { amount, rate, supply, tax, inputCgst, inputSgst, inputIgst, total };
      }

      const state = parseState();
      state.purchases = Array.isArray(state.purchases) ? state.purchases : [];
      state.supplierPayments = Array.isArray(state.supplierPayments) ? state.supplierPayments : [];
      const editingId = localStorage.getItem(EDIT_KEY) || '';
      if (editingId) localStorage.removeItem(EDIT_KEY);

      const supplierNames = Array.from(new Set(state.purchases.map((p) => String(p.supplier || '').trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b));
      supplierListEl.innerHTML = supplierNames.map((name) => `<option value="${escapeHtml(name)}"></option>`).join('');

      if (editingId) {
        const current = state.purchases.find((p) => p.id === editingId);
        if (current) {
          formTitle.textContent = 'Edit Purchase Invoice';
          saveBtn.textContent = 'Update Purchase Invoice';
          supplierEl.value = current.supplier || '';
          purchaseTypeEl.value = current.purchaseType || 'goods';
          itemEl.value = current.item || '';
          amountEl.value = Number(current.amount || 0) || '';
          supplyEl.value = current.supply || 'intra';
          gstRateEl.value = String(current.rate ?? 18);
          billNoEl.value = current.billNo || '';
          dateEl.value = current.date || new Date().toISOString().slice(0, 10);
          const dueDays = current.dueDays != null
            ? Number(current.dueDays) || 0
            : Math.max(0, Math.round((new Date(current.dueDate || current.date || Date.now()) - new Date(current.date || Date.now())) / (24 * 60 * 60 * 1000)));
          dueDaysEl.value = dueDays;
          notesEl.value = current.notes || '';
        }
      }

      ['input', 'change'].forEach((evt) => {
        amountEl.addEventListener(evt, calculate);
        gstRateEl.addEventListener(evt, calculate);
        supplyEl.addEventListener(evt, calculate);
      });
      calculate();

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        errorEl.textContent = '';
        const supplier = supplierEl.value.trim();
        const item = itemEl.value.trim() || 'Purchase';
        const billNo = billNoEl.value.trim();
        const date = dateEl.value || new Date().toISOString().slice(0, 10);
        const dueDays = Math.max(0, Number(dueDaysEl.value) || 0);
        if (!supplier) {
          errorEl.textContent = 'Supplier name is required.';
          return;
        }

        const calc = calculate();
        if (calc.amount <= 0) {
          errorEl.textContent = 'Amount should be greater than zero.';
          return;
        }

        const taxType = calc.rate === 0 ? 'NONE' : (calc.supply === 'inter' ? 'IGST' : 'CGST_SGST');
        const payload = {
          id: editingId || `PUR-${Date.now()}`,
          supplier,
          purchaseType: purchaseTypeEl.value || 'goods',
          supply: calc.supply,
          rate: calc.rate,
          item,
          amount: calc.amount,
          inputCgst: calc.inputCgst,
          inputSgst: calc.inputSgst,
          inputIgst: calc.inputIgst,
          total: calc.total,
          taxType,
          billNo,
          date,
          dueDays,
          dueDate: addDays(date, dueDays),
          notes: notesEl.value.trim()
        };

        const index = state.purchases.findIndex((p) => p.id === payload.id);
        if (index >= 0) state.purchases[index] = payload;
        else state.purchases.push(payload);

        saveState(state);
        goBack();
      });
    })();
  </script>
</body>
</html>
