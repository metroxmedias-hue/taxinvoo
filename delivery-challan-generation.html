<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Metrox TaxInvoo - Create Delivery Challan</title>
  <meta name="description" content="Dedicated Delivery Challan creation form." />
  <style>
    :root {
      --bg: #0b0e18;
      --panel: #11162a;
      --line: rgba(255,255,255,0.12);
      --ink: #f2efe6;
      --muted: rgba(242,239,230,0.72);
      --accent: #5b52f3;
      --danger: #ff8f8f;
      --input: rgba(255,255,255,0.03);
    }
    body.light {
      --bg: #f4f7ff;
      --panel: #ffffff;
      --line: rgba(15,23,42,0.15);
      --ink: #0f172a;
      --muted: rgba(15,23,42,0.66);
      --accent: #4f46e5;
      --danger: #dc2626;
      --input: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: "Space Grotesk", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(920px 520px at 18% -10%, rgba(91,82,243,0.16), transparent),
        radial-gradient(900px 520px at 112% 3%, rgba(88,214,193,0.12), transparent),
        linear-gradient(180deg, #0a0d16, var(--bg));
      display: grid;
      place-items: center;
    }
    .shell {
      width: min(980px, 100%);
      background: color-mix(in oklab, var(--panel) 90%, transparent);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      display: grid;
      gap: 16px;
      backdrop-filter: blur(6px);
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 26px; letter-spacing: -0.01em; }
    .muted { color: var(--muted); font-size: 13px; }
    form { display: grid; gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    label { display: grid; gap: 7px; font-size: 13px; color: var(--muted); }
    input, select, textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px;
      background: var(--input); color: var(--ink); font: inherit; outline: none;
    }
    textarea { min-height: 88px; resize: vertical; }
    .table-shell {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px; border-bottom: 1px solid var(--line); text-align: left; }
    th { color: var(--muted); font-weight: 600; }
    td input { min-width: 100px; }
    .summary {
      display: grid; gap: 8px; border: 1px solid var(--line); border-radius: 12px;
      padding: 12px; background: rgba(255,255,255,0.02);
    }
    .row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); }
    .row strong { color: var(--ink); }
    .error { color: var(--danger); font-size: 12px; min-height: 16px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px;
      background: rgba(255,255,255,0.03); color: var(--ink);
      font: inherit; font-weight: 600; cursor: pointer;
    }
    button.primary { border-color: transparent; background: linear-gradient(135deg, #5b52f3, #4b43d1); color: #fff; }
    @media (max-width: 760px) {
      body { padding: 12px; }
      .shell { padding: 14px; }
      .grid-2 { grid-template-columns: 1fr; }
      table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="head">
      <div>
        <h1>Create Delivery Challan</h1>
        <div class="muted">Create challan, then export one PDF with Original, Transport Copy, and Receiver Copy.</div>
      </div>
      <button type="button" id="back-btn">Back to Delivery Challan</button>
    </div>

    <form id="delivery-challan-form">
      <div class="grid-2">
        <label>Customer
          <select id="customer" required>
            <option value="">Select customer</option>
          </select>
        </label>
        <label>Invoice (optional)
          <select id="invoice">
            <option value="">Select invoice</option>
          </select>
        </label>
      </div>

      <div class="grid-2">
        <label>Challan date
          <input type="date" id="date" required />
        </label>
        <label>Delivery date
          <input type="date" id="delivery-date" />
        </label>
      </div>

      <div class="grid-2">
        <label>Transport mode
          <input type="text" id="transport-mode" placeholder="Road / Courier" />
        </label>
        <label>Vehicle / LR number
          <input type="text" id="vehicle-no" placeholder="MH12AB1234" />
        </label>
      </div>

      <div class="grid-2">
        <label>Status
          <select id="status">
            <option value="open">Open</option>
            <option value="delivered">Delivered</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </label>
        <label>Place of supply
          <select id="place-of-supply">
            <option value="intra">Intra-state</option>
            <option value="inter">Inter-state</option>
          </select>
        </label>
      </div>

      <div class="table-shell">
        <table>
          <thead>
            <tr>
              <th>Description</th>
              <th>HSN/SAC</th>
              <th>Qty</th>
              <th>Rate</th>
              <th>Tax %</th>
              <th>Tax Amt</th>
              <th>Amount</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="item-rows"></tbody>
        </table>
      </div>
      <button type="button" id="add-item">Add Item</button>

      <label>Notes
        <textarea id="notes" placeholder="Material dispatch notes, package details, etc."></textarea>
      </label>

      <div class="summary">
        <div class="row"><span>Taxable value</span><strong id="taxable-amount">INR 0</strong></div>
        <div class="row"><span>Total GST</span><strong id="gst-amount">INR 0</strong></div>
        <div class="row"><span>Total amount</span><strong id="total-amount">INR 0</strong></div>
      </div>

      <div class="error" id="error"></div>
      <div class="actions">
        <button type="submit" class="primary">Save Delivery Challan</button>
        <button type="button" id="cancel-btn">Cancel</button>
      </div>
    </form>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = 'metrox_taxinvoo_demo_state';
      const BACKUP_KEY = 'metrox_taxinvoo_demo_state_backup';
      const LAST_GOOD_KEY = 'metrox_taxinvoo_last_good_state';
      const FOCUS_KEY = 'metrox_open_delivery_challan_form';
      const EDIT_KEY = 'metrox_edit_delivery_challan_id';
      const target = 'index.html#/sales-transactions';
      const fmt = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 2 });

      const theme = localStorage.getItem('Metrox TaxInvoo_theme');
      if (theme === 'light') document.body.classList.add('light');

      const customerEl = document.getElementById('customer');
      const invoiceEl = document.getElementById('invoice');
      const dateEl = document.getElementById('date');
      const deliveryDateEl = document.getElementById('delivery-date');
      const transportModeEl = document.getElementById('transport-mode');
      const vehicleNoEl = document.getElementById('vehicle-no');
      const statusEl = document.getElementById('status');
      const placeOfSupplyEl = document.getElementById('place-of-supply');
      const notesEl = document.getElementById('notes');
      const itemRowsEl = document.getElementById('item-rows');
      const taxableAmountEl = document.getElementById('taxable-amount');
      const gstAmountEl = document.getElementById('gst-amount');
      const totalAmountEl = document.getElementById('total-amount');
      const errorEl = document.getElementById('error');
      const submitBtn = document.querySelector('#delivery-challan-form button[type="submit"]');

      dateEl.value = new Date().toISOString().slice(0, 10);
      deliveryDateEl.value = new Date().toISOString().slice(0, 10);

      function goBack() {
        try { localStorage.setItem(FOCUS_KEY, '1'); } catch (_) {}
        window.location.href = target;
      }

      document.getElementById('back-btn').addEventListener('click', goBack);
      document.getElementById('cancel-btn').addEventListener('click', goBack);

      function parseState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === 'object' ? parsed : {};
        } catch (_) {
          return {};
        }
      }

      function saveState(next) {
        const payload = next && typeof next === 'object' ? next : {};
        payload._meta = { ...(payload._meta || {}), updated_at: new Date().toISOString() };
        const serialized = JSON.stringify(payload);
        localStorage.setItem(STORAGE_KEY, serialized);
        localStorage.setItem(BACKUP_KEY, serialized);
        localStorage.setItem(LAST_GOOD_KEY, serialized);
      }

      const state = parseState();
      state.customers = state.customers && typeof state.customers === 'object' ? state.customers : {};
      state.invoices = Array.isArray(state.invoices) ? state.invoices : [];
      state.deliveryChallans = Array.isArray(state.deliveryChallans) ? state.deliveryChallans : [];
      const editingId = localStorage.getItem(EDIT_KEY) || '';
      if (editingId) localStorage.removeItem(EDIT_KEY);

      const customerNames = Object.keys(state.customers)
        .filter((name) => !state.customers[name]?.deleted)
        .sort((a, b) => a.localeCompare(b));
      customerEl.innerHTML = ['<option value="">Select customer</option>']
        .concat(customerNames.map((name) => `<option value="${name}">${name}</option>`))
        .join('');

      function renderInvoiceOptions(customerName) {
        const list = state.invoices
          .filter((inv) => !customerName || inv.customer === customerName)
          .sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
        invoiceEl.innerHTML = ['<option value="">Select invoice</option>']
          .concat(list.map((inv) => `<option value="${inv.id}">${inv.id} | ${inv.customer}</option>`))
          .join('');
      }

      function itemRow(data = {}) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><input name="description" placeholder="Item / service" value="${data.description || ''}" /></td>
          <td><input name="hsn" placeholder="HSN/SAC" value="${data.hsn || ''}" /></td>
          <td><input name="qty" type="number" min="1" step="1" value="${data.qty || 1}" /></td>
          <td><input name="rate" type="number" min="0" step="0.01" value="${data.rate || 0}" /></td>
          <td><input name="taxRate" type="number" min="0" step="0.01" value="${data.taxRate || 0}" /></td>
          <td><input name="taxAmount" type="number" min="0" step="0.01" value="0" readonly /></td>
          <td><input name="amount" type="number" min="0" step="0.01" value="0" readonly /></td>
          <td><button type="button" class="remove">Remove</button></td>
        `;
        const qty = tr.querySelector('input[name="qty"]');
        const rate = tr.querySelector('input[name="rate"]');
        const taxRate = tr.querySelector('input[name="taxRate"]');
        const taxAmount = tr.querySelector('input[name="taxAmount"]');
        const amount = tr.querySelector('input[name="amount"]');

        function update() {
          const taxable = (Number(qty.value) || 0) * (Number(rate.value) || 0);
          const tax = taxable * ((Number(taxRate.value) || 0) / 100);
          const total = taxable + tax;
          taxAmount.value = String(tax.toFixed(2));
          amount.value = String(total.toFixed(2));
          updateTotal();
        }

        qty.addEventListener('input', update);
        rate.addEventListener('input', update);
        taxRate.addEventListener('input', update);
        tr.querySelector('.remove').addEventListener('click', () => {
          tr.remove();
          if (!itemRowsEl.querySelector('tr')) itemRowsEl.appendChild(itemRow());
          updateTotal();
        });

        update();
        return tr;
      }

      function updateTotal() {
        let taxable = 0;
        let gst = 0;
        let total = 0;
        Array.from(itemRowsEl.querySelectorAll('tr')).forEach((tr) => {
          const qty = Number(tr.querySelector('input[name="qty"]')?.value || 0);
          const rate = Number(tr.querySelector('input[name="rate"]')?.value || 0);
          const tax = Number(tr.querySelector('input[name="taxAmount"]')?.value || 0);
          taxable += (qty * rate);
          gst += tax;
          total += Number(tr.querySelector('input[name="amount"]')?.value || 0);
        });
        if (taxableAmountEl) taxableAmountEl.textContent = `INR ${fmt.format(taxable)}`;
        if (gstAmountEl) gstAmountEl.textContent = `INR ${fmt.format(gst)}`;
        totalAmountEl.textContent = `INR ${fmt.format(total)}`;
        return { taxable, gst, total };
      }

      function collectItems() {
        return Array.from(itemRowsEl.querySelectorAll('tr')).map((tr) => {
          const description = String(tr.querySelector('input[name="description"]')?.value || '').trim();
          const hsn = String(tr.querySelector('input[name="hsn"]')?.value || '').trim();
          const qty = Number(tr.querySelector('input[name="qty"]')?.value || 0);
          const rate = Number(tr.querySelector('input[name="rate"]')?.value || 0);
          const taxRate = Number(tr.querySelector('input[name="taxRate"]')?.value || 0);
          const taxAmount = Number(tr.querySelector('input[name="taxAmount"]')?.value || 0);
          const total = Number(tr.querySelector('input[name="amount"]')?.value || 0);
          return { description, hsn, qty, rate, taxRate, taxAmount, total };
        }).filter((item) => item.description && item.qty > 0);
      }

      customerEl.addEventListener('change', () => {
        renderInvoiceOptions(customerEl.value);
      });

      invoiceEl.addEventListener('change', () => {
        const inv = state.invoices.find((entry) => String(entry.id) === String(invoiceEl.value));
        if (!inv) return;
        if (customerEl.value !== inv.customer) customerEl.value = inv.customer;
        const invItems = Array.isArray(inv.items) ? inv.items : [];
        if (invItems.length) {
          itemRowsEl.innerHTML = '';
          invItems.forEach((item) => {
            itemRowsEl.appendChild(itemRow({
              description: item.description || '',
              hsn: item.hsn || item.sac || '',
              qty: Number(item.qty) || 1,
              rate: Number(item.price) || 0,
              taxRate: Number(inv.rate) || 0
            }));
          });
        }
        updateTotal();
      });

      document.getElementById('add-item').addEventListener('click', () => {
        itemRowsEl.appendChild(itemRow());
      });

      renderInvoiceOptions('');
      itemRowsEl.appendChild(itemRow());

      if (editingId) {
        const existing = state.deliveryChallans.find((entry) => entry.id === editingId);
        if (existing) {
          document.title = 'Metrox TaxInvoo - Edit Delivery Challan';
          const titleEl = document.querySelector('h1');
          if (titleEl) titleEl.textContent = 'Edit Delivery Challan';
          if (submitBtn) submitBtn.textContent = 'Update Delivery Challan';
          if (existing.customer) {
            customerEl.value = existing.customer;
            renderInvoiceOptions(existing.customer);
          }
          if (existing.invoiceId) invoiceEl.value = existing.invoiceId;
          if (existing.date) dateEl.value = existing.date;
          if (existing.deliveryDate) deliveryDateEl.value = existing.deliveryDate;
          transportModeEl.value = existing.transportMode || '';
          vehicleNoEl.value = existing.vehicleNo || '';
          statusEl.value = existing.status || 'open';
          placeOfSupplyEl.value = existing.placeOfSupply || 'intra';
          notesEl.value = existing.notes || '';
          const existingItems = Array.isArray(existing.items) ? existing.items : [];
          if (existingItems.length) {
            itemRowsEl.innerHTML = '';
            existingItems.forEach((item) => itemRowsEl.appendChild(itemRow({
              description: item.description || '',
              hsn: item.hsn || '',
              qty: Number(item.qty) || 1,
              rate: Number(item.rate) || 0,
              taxRate: Number(item.taxRate) || 0
            })));
          }
          updateTotal();
        }
      }

      document.getElementById('delivery-challan-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const customer = customerEl.value;
        const items = collectItems();
        const totals = updateTotal();
        if (!customer) {
          errorEl.textContent = 'Select customer.';
          return;
        }
        if (!items.length) {
          errorEl.textContent = 'Add at least one valid item.';
          return;
        }

        const profile = state.customers[customer] || {};
        const payload = {
          id: editingId || `DC-${Date.now()}`,
          date: dateEl.value || new Date().toISOString().slice(0, 10),
          createdAt: editingId
            ? (state.deliveryChallans.find((entry) => entry.id === editingId)?.createdAt || new Date().toISOString())
            : new Date().toISOString(),
          deliveryDate: deliveryDateEl.value || '',
          customer,
          invoiceId: invoiceEl.value || '',
          taxable: totals.taxable,
          gst: totals.gst,
          amount: totals.total,
          status: statusEl.value || 'open',
          placeOfSupply: placeOfSupplyEl.value || 'intra',
          transportMode: String(transportModeEl.value || '').trim(),
          vehicleNo: String(vehicleNoEl.value || '').trim(),
          notes: String(notesEl.value || '').trim(),
          items,
          customerDetails: {
            gstin: profile.gstin || '',
            phone: profile.phone || '',
            email: profile.email || '',
            address: profile.address || '',
            state: profile.state || '',
            stateCode: profile.stateCode || ''
          }
        };
        if (editingId) {
          const idx = state.deliveryChallans.findIndex((entry) => entry.id === editingId);
          if (idx >= 0) state.deliveryChallans[idx] = payload;
          else state.deliveryChallans.push(payload);
        } else {
          state.deliveryChallans.push(payload);
        }
        saveState(state);
        goBack();
      });
    })();
  </script>
</body>
</html>
